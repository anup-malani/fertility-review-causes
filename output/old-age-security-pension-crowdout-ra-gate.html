ty incentive can be built into programmes.", "is_gold": false, "tier": 3, "evidence_type": "review", "cell": "OFF", "outcome": "fertility", "mechanism": "child-linked social cash transfers as fertility incentive", "direction": "forward", "reason": "reviews whether social cash transfers raise fertility; transfers are welfare/child-linked, not OAS/pensions", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Unconditional%20Government%20Social%20Cash%20Transfers%20in%20Africa%20do%20not%20Increase%20Fertility"}, {"id": "W2337986896", "group": "uncertain", "title": "Unconditional Government Social Cash Transfers in Africa Do Not Increase Fertility : Issue Brief", "year": null, "venue": null, "authors": null, "abstract": "A common perception surrounding the design and implementation of social cash transfers is that those targeted to families with young children will incentivize families to have more children. To date, however, research on unconditional cash transfer programmes in Africa (including Kenya, Malawi, South Africa and Zambia) have demonstrated no impacts of cash transfer programmes on increased fertility. Examples are given of how some design features capable of minimizing the fertility incentive can be built into programmes.", "is_gold": false, "tier": 3, "evidence_type": "review", "cell": "OFF", "outcome": "fertility", "mechanism": "unconditional child/family cash transfers", "direction": "forward", "reason": "Transfer->fertility, but transfers are child/family-targeted welfare, not the OAS/pension channel.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Unconditional%20Government%20Social%20Cash%20Transfers%20in%20Africa%20Do%20Not%20Increase%20Fertility%20%3A%20Issue%20Brief"}, {"id": "W4307690347", "group": "uncertain", "title": "Upbringing of Child by a Parent for the Purpose of Determination of Retirement Age and Increase of Old-Age Pension", "year": null, "venue": null, "authors": null, "abstract": "The paper deals with the concept of “child upbringing” by a parent in the pension insurance. First, attention is paid to which persons are considered to be the parents of a raised child, then the fulfilment of the condition of the child’s upbringing is analysed for the purpose of determination of the retirement age of women as one of the conditions for the entitlement to an old-age pension. The individual aspects of a child’s upbringing are described in selected court decisions. From year 2023, upbringing of a child also plays a role in increasing the old-age pension. In this context, a discrepancy in the legal regulation in the assessment of children who died at a young age is pointed out. The reasons for the emergence of this contradiction are analysed, undesirable effects in determining the retirement age of women are pointed out and possible solutions are outlined.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "retirement age / pension amount", "mechanism": "crediting child-rearing in pension entitlement", "direction": "reverse", "reason": "Legal analysis of child-rearing credits in pension law; touches fertility-related pension design but estimates no fertility effect.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Upbringing%20of%20Child%20by%20a%20Parent%20for%20the%20Purpose%20of%20Determination%20of%20Retirement%20Age%20and%20Increase%20of%20Old-Age%20Pension"}, {"id": "W4388707253", "group": "uncertain", "title": "Who Does “Endowment Insurance” Support: The Elderly or Their Grown-up Children?", "year": null, "venue": null, "authors": null, "abstract": "This research paper seeks to understand whether the current basic endowment insurance policy has properly played the role of supporting the elderly needs through intergenerational support within the family. Theoretically, there are problems of the imbalanced structure of pension security, retirees’ comparatively higher pension and the low-level security of young people’s in-service income, and drawbacks of the existing endowment insurance system, both have a certain causal relationship with “gnawing the old.” Data on China’s family tracking survey in 2016 (CFPS2016), Probit model, IV and PSM robustness testing methods were also used to study the relationship between parents’ pensions and their grownup children’s “gnawing-the-old” behavior. The results show that: (1) Compared with young people from families without pension income, those with pensioned parent(s) will less possibly choose to work; the parents’ financial assistance behavior would restrain the children’s intention to work and increase the possibility of “gnawing the old”; (2) Neither the amount of pension income nor financial assistance given to the children is significantly related to young people’s “gnawing the old”; (3) Young people’s “gnawing the old” behaviors are different according to their parents’ professions and living areas; (4) The gap between parents’ pension income and children’s in-service income also adds to the causes of “gnawing the old.” The policy implications of these findings are discussed particularly the formulation of a scientific mechanism for pension income.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "adult children's labor supply ('gnawing the old')", "mechanism": "parental pension income → children's work/dependence", "direction": "forward", "reason": "pension income effect on adult children's work behavior, not fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Who%20Does%20%E2%80%9CEndowment%20Insurance%E2%80%9D%20Support%3A%20The%20Elderly%20or%20Their%20Grown-up%20Children%3F"}, {"id": "W4229376737", "group": "uncertain", "title": "Will Downward Intergenerational Housing Support Increase Parents’ Expectations for Old-Age Care from Adult Children? Evidence from China", "year": null, "venue": null, "authors": null, "abstract": "Toward a background of young people's decreasing housing affordability and parents' increasing involvement in intergenerational housing support, this study investigates how such support influences parents' expectation of future care from adult children. Using data from the China Health and Retirement Longitudinal Study, we found that, in general, middle-aged/older adults who provided adult children financial housing support were more likely to expect old-age care from them. The help-receiving child was more likely to be an expected caregiver than the other children in multi-children families. Moreover, the reciprocal relationship was most prominent among the 1950s cohort, compared with the pre-1950s and the post-1950s cohorts. Our study broadly contributes to understanding how modernization reshapes intergenerational relationships and family members' expectations of commitments toward each other. It also informs the design of a comprehensive multi-level care system for older adults in China.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "parents' expectation of old-age care from children", "mechanism": "intergenerational housing support / reciprocity", "direction": "reverse", "reason": "Studies OAS-support expectations from adult children but no fertility outcome; adjacent to the motive.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Will%20Downward%20Intergenerational%20Housing%20Support%20Increase%20Parents%E2%80%99%20Expectations%20for%20Old-Age%20Care%20from%20Adult%20Children%3F%20Evidence%20from%20China"}, {"id": "W3090401051", "group": "uncertain", "title": "Will Ending the One-Child Policy and Raising the Retirement Age Enhance the Sustainability of China’s Basic Pension System?", "year": null, "venue": null, "authors": null, "abstract": "The sustainability of China’s Basic Pension System (CBPS) has been challenged by the ageing of the population and the decline in economic growth. This article establishes a Markov model for CBPS to examine whether the reforms, including ending the one-child policy and raising retirement the age, will shrink the negative income–expenditure gap. We find that the negative income–expenditure gap will destroy CBPS in the future in the absence of fiscal transfer or reform. Ending the one-child policy will increase the number of contributors and then reduce the gap in the short term but will worsen the gap in the long term. Raising the retirement age will have several positive effects overall while increasing expenditures in certain periods. The contributions of this article are describing CBPS in detail and establishing a precise model to analyze the effectiveness of reforms.", "is_gold": false, "tier": 3, "evidence_type": "structural", "cell": "OFF", "outcome": "pension system sustainability (income-expenditure gap)", "mechanism": "fertility policy affects number of pension contributors", "direction": "reverse", "reason": "Models how ending one-child policy affects pension sustainability; fertility is input to pensions, not outcome.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Will%20Ending%20the%20One-Child%20Policy%20and%20Raising%20the%20Retirement%20Age%20Enhance%20the%20Sustainability%20of%20China%E2%80%99s%20Basic%20Pension%20System%3F"}, {"id": "W3045743627", "group": "uncertain", "title": "“Children are our pension”: Livelihood diversification, social security, and kinship constraints among East African refugees", "year": null, "venue": null, "authors": null, "abstract": "Stereotypical ideas about poverty and life in refugee camps make it difficult to understand the choices that individual refugees make when moving from one place to another within Africa, including from refugee settlements to town, to refugee camps and vice versa. Certain choices which individual migrants make, and which may appear incomprehensible, respond in fact to a clear logic and represent, as it were, diversified forms of social security. Recent trends in migration theories have emphasised the importance of the positive role of the group of kin in the decision to set out on the migration path, but this article reveals a much more complex dynamic underlying such movements within Africa: a vision of livelihood diversification that goes beyond the stark reality of forced displacement or the opportunity of acquiring refugee status. The article will take into consideration the migratory trajectories of a number of young persons, across the Horn and some eastern African nations, first as forced migrants and later as refugees migrating at will, as observed over a period of years. Over and above the war that initially prompted migration, the movements of these young people result from negotiating the demands of individual agency and the constraints imposed by kinship ideologies.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "livelihood diversification / migration decisions", "mechanism": "children as social security among refugees", "direction": "n/a", "reason": "Invokes 'children are our pension' and social security but the substantive outcome is migration/livelihood, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=%E2%80%9CChildren%20are%20our%20pension%E2%80%9D%3A%20Livelihood%20diversification%2C%20social%20security%2C%20and%20kinship%20constraints%20among%20East%20African%20refugees"}]};
const KEY = "ra-gate:" + DATA.slug;
const ALL = {pooling: DATA.pooling, uncertain: DATA.uncertain};
const BYID = {}; [...DATA.pooling, ...DATA.uncertain].forEach(r=>BYID[r.id]=r);

let state = load();               // {decisions:{id:{v,bucket,note,ts}}, pos:{pooling,uncertain}, mode}
let mode = state.mode || "pooling";

function load(){
  try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s&&s.decisions) return s; }catch(e){}
  return {decisions:{}, pos:{pooling:0,uncertain:0}, mode:"pooling"};
}
function save(){ state.mode=mode; localStorage.setItem(KEY, JSON.stringify(state)); }

// verdict configs per mode
const VCFG = {
  pooling:  [ {v:"confirm", label:"Confirm in-cell", cls:"ok",  key:"1"},
              {v:"demote",  label:"Demote off-cell", cls:"no",  key:"2"},
              {v:"unsure",  label:"Unsure",          cls:"skip",key:"3"} ],
  uncertain:[ {v:"relevant",label:"Relevant",        cls:"ok",  key:"1"},
              {v:"not",     label:"Not relevant",     cls:"no",  key:"2"},
              {v:"unsure",  label:"Unsure",          cls:"skip",key:"3"} ]
};
const VLABEL = {confirm:"in-cell",demote:"off-cell",relevant:"relevant",not:"not relevant",unsure:"unsure"};
const VCLS = {confirm:"okbg",demote:"nobg",relevant:"okbg",not:"nobg",unsure:"skipbg"};

function list(){ return ALL[mode]; }
function pos(){ return Math.max(0, Math.min(state.pos[mode]||0, list().length-1)); }
function setPos(p){ state.pos[mode]=Math.max(0,Math.min(p,list().length-1)); save(); render(); }

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(){
  document.getElementById("pc").textContent = ALL.pooling.length;
  document.getElementById("uc").textContent = ALL.uncertain.length;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.mode===mode));
  const isSummary = mode==="summary";
  document.getElementById("reviewer").classList.toggle("hide", isSummary);
  document.getElementById("summary").classList.toggle("hide", !isSummary);
  document.getElementById("decisionbar").classList.toggle("hide", isSummary);
  renderCounts();
  if(isSummary){ renderSummary(); return; }
  renderCard();
}

function renderCounts(){
  const el=document.getElementById("counts");
  function tally(arr){ const t={done:0,total:arr.length}; arr.forEach(r=>{ if(state.decisions[r.id]) t.done++; }); return t; }
  const p=tally(ALL.pooling), u=tally(ALL.uncertain);
  // pooling breakdown
  const pv={confirm:0,demote:0,unsure:0}; ALL.pooling.forEach(r=>{const d=state.decisions[r.id];if(d)pv[d.v]++;});
  const uv={relevant:0,not:0,unsure:0}; ALL.uncertain.forEach(r=>{const d=state.decisions[r.id];if(d)uv[d.v]++;});
  el.innerHTML =
    `<span>Pooling: <b>${p.done}/${p.total}</b> · in-cell ${pv.confirm} · off-cell ${pv.demote} · unsure ${pv.unsure}</span>`+
    `<span>UNCERTAINs: <b>${u.done}/${u.total}</b> · relevant ${uv.relevant} · not ${uv.not} · unsure ${uv.unsure}</span>`+
    `<span>Confirmed pooling set → <b>${pv.confirm}</b> studies</span>`;
  const arr=list();
  if(mode!=="summary"){
    const done = arr.filter(r=>state.decisions[r.id]).length;
    document.getElementById("bar").style.width = (arr.length? (done/arr.length*100):0)+"%";
  }
}

function renderCard(){
  const arr=list(), i=pos(), r=arr[i];
  if(!r){ document.getElementById("card").innerHTML="<p>Nothing to review.</p>"; return; }
  const d = state.decisions[r.id];
  const meta = [r.year, r.venue, r.authors].filter(Boolean).join(" · ");
  const cellcls = "cell-"+(r.cell||"null");
  let gate;
  if(mode==="pooling"){
    gate = `<div class="lab">Gate's call — does this identify the primary cell?
        <span class="cellpill ${cellcls}">${esc(r.cell||"?")}</span></div>
      <dl class="axes">
        <dt>outcome</dt><dd>${esc(r.outcome||"—")}</dd>
        <dt>mechanism</dt><dd>${esc(r.mechanism||"—")}</dd>
        <dt>direction</dt><dd>${esc(r.direction||"—")}</dd>
      </dl>
      ${r.reason?`<div class="gatereason">"${esc(r.reason)}"</div>`:""}`;
  } else {
    gate = `<div class="lab">Screen said UNCERTAIN
        <span class="cellpill ${cellcls}">cell: ${esc(r.cell||"?")}</span>
        ${r.evidence_type?`<span class="cellpill cell-null">${esc(r.evidence_type)}</span>`:""}</div>
      ${r.reason?`<div class="gatereason">"${esc(r.reason)}"</div>`:""}
      ${r.snow_reason?`<div class="hint" style="margin-top:6px">discovery note: ${esc(r.snow_reason)}</div>`:""}`;
  }
  const absHtml = r.abstract
    ? `<div class="abstract">${esc(r.abstract)}</div>`
    : `<div class="abstract noabs">No abstract on file — <a href="${esc(r.scholar)}" target="_blank" rel="noopener">open in Google Scholar</a> to read.</div>`;
  const decided = d ? `<span class="decided" style="background:var(--${VCLS[d.v]})">your call: ${VLABEL[d.v]}${d.bucket?" ("+d.bucket+")":""}</span>` : "";
  document.getElementById("card").innerHTML = `
    <div class="cardhead">
      <span class="pos">${i+1} / ${arr.length}</span>
      ${r.is_gold?'<span class="gold">gold anchor</span>':''}
      ${decided}
    </div>
    <div class="ttl"><a href="${esc(r.scholar)}" target="_blank" rel="noopener">${esc(r.title)}</a></div>
    <div class="meta">${esc(meta)||"&nbsp;"}</div>
    <div class="gatebox">${gate}</div>
    ${absHtml}`;
  renderButtons(d);
  // restore demote UI + note
  const nb=document.getElementById("note"); nb.value = d&&d.note?d.note:"";
  const dr=document.getElementById("demoteRow");
  dr.style.display = (mode==="pooling" && d && d.v==="demote") ? "flex":"none";
  if(d&&d.bucket) document.getElementById("bucket").value=d.bucket;
  else document.getElementById("bucket").value="";
}

function renderButtons(d){
  const box=document.getElementById("dbtns");
  const cfg=VCFG[mode];
  box.innerHTML = cfg.map(c=>
    `<button class="dbtn ${c.cls} ${d&&d.v===c.v?'sel':''}" data-v="${c.v}">${c.label} <kbd>${c.key}</kbd></button>`
  ).join("") +
   `<div class="nav">
      <button class="btn" data-nav="-1">&larr; Prev</button>
      <button class="btn" data-nav="1">Next &rarr;</button>
    </div>`;
}

function decide(v){
  const arr=list(), r=arr[pos()];
  if(!r) return;
  const prev = state.decisions[r.id]||{};
  const note = document.getElementById("note").value.trim();
  const bucket = (mode==="pooling"&&v==="demote") ? document.getElementById("bucket").value : "";
  state.decisions[r.id] = {v, bucket, note, ts:Date.now()};
  save();
  const dr=document.getElementById("demoteRow");
  if(mode==="pooling"&&v==="demote"){
    dr.style.display="flex"; renderCard();          // stay so RA can pick a bucket
    return;
  }
  // auto-advance to next undecided (fallback: next)
  advance();
}
function advance(){
  const arr=list(); let p=pos();
  let n=p+1;
  while(n<arr.length && state.decisions[arr[n].id]) n++;   // skip already-done
  if(n>=arr.length) n=Math.min(p+1,arr.length-1);
  setPos(n);
}
function undo(){
  const r=list()[pos()]; if(r){ delete state.decisions[r.id]; save(); render(); }
}

function renderSummary(){
  const el=document.getElementById("summary");
  function tbl(title, arr, cols){
    let h=`<h2 style="font-size:14px;margin:18px 0 8px">${title}</h2><table><thead><tr>
      <th>#</th><th>your call</th><th>title</th>${cols}</tr></thead><tbody>`;
    arr.forEach((r,i)=>{
      const d=state.decisions[r.id];
      const call = d?`<span class="tag" style="background:var(--${VCLS[d.v]})">${VLABEL[d.v]}${d.bucket?"·"+d.bucket:""}</span>`:'<span class="hint">—</span>';
      h+=`<tr data-mode="${r.group}" data-id="${r.id}"><td>${i+1}</td><td>${call}</td>
        <td>${r.is_gold?'<span class="gold">gold</span> ':''}${esc(r.title)}</td>
        ${r.group==='pooling'
          ? `<td><span class="cellpill cell-${r.cell||'null'}">${esc(r.cell||'?')}</span></td>`
          : `<td>${esc(r.evidence_type||'')}</td>`}</tr>`;
    });
    return h+"</tbody></table>";
  }
  el.innerHTML = tbl("Pooling set (61) — spot-check", ALL.pooling, "<th>gate cell</th>")
              + tbl("UNCERTAINs (88) — relevance", ALL.uncertain, "<th>type</th>");
  el.querySelectorAll("tr[data-id]").forEach(tr=>tr.addEventListener("click",()=>{
    mode=tr.dataset.mode;
    const idx=list().findIndex(r=>r.id===tr.dataset.id);
    setPos(idx); render();
  }));
}

// ---- exports ----
function download(name, text, type){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 500);
}
function exportRows(){
  const rows=[];
  [...ALL.pooling,...ALL.uncertain].forEach(r=>{
    const d=state.decisions[r.id];
    rows.push({group:r.group, id:r.id, title:r.title, is_gold:r.is_gold,
      gate_cell:r.cell, verdict:d?d.v:"", ra_label:d?VLABEL[d.v]:"",
      off_cell_bucket:d?d.bucket:"", note:d?d.note:""});
  });
  return rows;
}
document.getElementById("exportJson").onclick=()=>{
  download(DATA.slug+"-ra-gate-decisions.json",
    JSON.stringify({slug:DATA.slug, exported:Date.now(), decisions:state.decisions, rows:exportRows()}, null, 2),
    "application/json");
};
document.getElementById("exportCsv").onclick=()=>{
  const rows=exportRows(); const cols=Object.keys(rows[0]);
  const q=s=>'"'+String(s==null?"":s).replace(/"/g,'""')+'"';
  const csv=[cols.join(",")].concat(rows.map(r=>cols.map(c=>q(r[c])).join(","))).join("\n");
  download(DATA.slug+"-ra-gate-decisions.csv", csv, "text/csv");
};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=(e)=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const j=JSON.parse(rd.result);
    if(j.decisions){ state.decisions=Object.assign(state.decisions,j.decisions); save(); render();
      alert("Imported "+Object.keys(j.decisions).length+" decisions."); }
    else alert("No decisions field found."); }catch(err){ alert("Bad JSON: "+err); } };
  rd.readAsText(f);
};

// ---- events ----
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{ mode=t.dataset.mode; save(); render(); });
document.addEventListener("click",e=>{
  const b=e.target.closest("[data-v]"); if(b){ decide(b.dataset.v); return; }
  const n=e.target.closest("[data-nav]"); if(n){ setPos(pos()+ (+n.dataset.nav)); return; }
});
document.getElementById("bucket").onchange=()=>{
  const r=list()[pos()], d=state.decisions[r.id];
  if(d){ d.bucket=document.getElementById("bucket").value; save(); }
};
document.getElementById("note").addEventListener("blur",()=>{
  const r=list()[pos()], d=state.decisions[r.id];
  if(d){ d.note=document.getElementById("note").value.trim(); save(); }
});
document.addEventListener("keydown",e=>{
  if(mode==="summary") return;
  const t=e.target.tagName;
  if(t==="INPUT"||t==="SELECT"||t==="TEXTAREA") return;
  const cfg=VCFG[mode];
  const hit=cfg.find(c=>c.key===e.key);
  if(hit){ e.preventDefault(); decide(hit.v); return; }
  if(e.key==="ArrowRight"||e.key==="j"){ e.preventDefault(); setPos(pos()+1); }
  else if(e.key==="ArrowLeft"||e.key==="k"){ e.preventDefault(); setPos(pos()-1); }
  else if(e.key==="u"){ e.preventDefault(); undo(); }
});

render();
</script>
</body>
</html>
