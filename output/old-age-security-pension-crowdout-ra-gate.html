replacement fertility", "mechanism": "interfamily transfers / old-age support markets", "direction": "forward", "reason": "Analysis of interfamily transfers (old-age support) and below-replacement fertility in industrial societies", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Competitive%20Human%20Markets%2C%20Interfamily%20Transfers%2C%20and%20Below-Replacement%20Fertility"}, {"id": "W2338799371", "group": "pooling", "title": "Institutions and the search for security in old age: Fertility behavior, labor force participation, savings, insurance, and bequests in rural Thailand", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": true, "tier": 1, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility (and savings, labor, insurance)", "mechanism": "old-age security motive among institutions", "direction": "forward", "reason": "Empirical study of search for old-age security including fertility behavior in rural Thailand", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Institutions%20and%20the%20search%20for%20security%20in%20old%20age%3A%20Fertility%20behavior%2C%20labor%20force%20participation%2C%20savings%2C%20insurance%2C%20and%20bequests%20in%20rural%20Thailand"}, {"id": "W2088799776", "group": "pooling", "title": "Old Age Pensions and Fertility in Rural Areas of Less Developed Countries: Some Evidence from Mexico", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": true, "tier": 1, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "old-age pensions substitute for children as old-age support", "direction": "forward", "reason": "Empirical evidence on old-age pensions and rural fertility in Mexico", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old%20Age%20Pensions%20and%20Fertility%20in%20Rural%20Areas%20of%20Less%20Developed%20Countries%3A%20Some%20Evidence%20from%20Mexico"}, {"id": "W2036636895", "group": "pooling", "title": "Old-age security motives, labor markets, and farm family fertility in antebellum American", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": true, "tier": 1, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "farm family fertility", "mechanism": "old-age security motive and labor markets", "direction": "forward", "reason": "Empirical study of old-age-security motives on farm family fertility in antebellum America", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old-age%20security%20motives%2C%20labor%20markets%2C%20and%20farm%20family%20fertility%20in%20antebellum%20American"}, {"id": "W2088985964", "group": "pooling", "title": "Pensions and fertility: in search of a link", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": true, "tier": 1, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "pensions / old-age security", "direction": "forward", "reason": "Empirical investigation ('in search of a link') of the pension-to-fertility relationship, forward direction.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Pensions%20and%20fertility%3A%20in%20search%20of%20a%20link"}, {"id": "W3166527634", "group": "pooling", "title": "Pensions and Fertility: Micro-Economic Evidence", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": true, "tier": 1, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "pensions / old-age security", "direction": "forward", "reason": "Micro-economic evidence on pensions and fertility, forward empirical estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Pensions%20and%20Fertility%3A%20Micro-Economic%20Evidence"}, {"id": "W2045582700", "group": "pooling", "title": "Risk and Insurance: Perspectives on Fertility and Agrarian Change in India and Bangladesh", "year": null, "venue": null, "authors": null, "abstract": "Relative to other approaches and emphases -- the value of childrens labor for example -- the potential importance of environmentally and socially determined risk as a source of derived demand for children in poor agrarian settings has been largely overlooked. Using frequency of distress sale of land as an indicator of the adequacy of insurance mechanisms this article compares sources of risk and means of insurance in rural Bangladesh (represented by the village of Char Gopalpur) and a semi arid area of south central India (represented by 2 villages in Maharashtra and 1 in Andhra Pradesh). While both regions are characterized by harsh environment of risk in the Indian setting efficient adjustment mechanisms have evolved -- particularly capital markets and public relief employment -- that have partially neutralized risk prefvented the distress sale of land and greatly reudced the need for the insurance that children could otherwise provide. No comparable mechanisms exist in the Bangladesh setting and thus the value of children remains high. It is suggested that regional differences in environments of risk and sources of insurance within South Asia may go far to explain regional differences in recent fertility trends. (authors) (summaries in ENG FRE SPA)", "is_gold": true, "tier": 1, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility / demand for children", "mechanism": "risk and insurance value of children (old-age/security)", "direction": "forward", "reason": "Empirical comparison of insurance/security demand for children explaining fertility differences in South Asia", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Risk%20and%20Insurance%3A%20Perspectives%20on%20Fertility%20and%20Agrarian%20Change%20in%20India%20and%20Bangladesh"}, {"id": "W643491437", "group": "pooling", "title": "Social Security, Saving and Fertility", "year": null, "venue": null, "authors": null, "abstract": "We investigate the effect of government policies on fertility in a model where children are mainly seen as investment goods. To illustrate this effect we construct a simple overlapping generations economy in which households (parents) can invest both in children and financial assets. An introduction of the public social security system lowers the incentive to have children, i.e. fertility will be lower. This is an important negative externality. We test some of the model’s basic implications using unique long historical panel data from 11 countries for the period 1750–2000. In addition, we use two additional, more recent, data sets to reinforce the empirical results obtained with historical data. These analyses show that there is a positive relationship between ageing and fertility if we control for the key determinants of fertility. By contrast, there is a strong negative relationship between (various indicators of) social security and fertility. Empirical evidence is found for the notion that child support increases fertility.", "is_gold": true, "tier": 1, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "social security displaces children as investment goods", "direction": "forward", "reason": "OLG model tested on 11-country historical panel finding negative social-security-fertility relationship", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Social%20Security%2C%20Saving%20and%20Fertility"}, {"id": "W4409334223", "group": "pooling", "title": "The impact of long-term care insurance on family fertility behaviour: evidence from China", "year": null, "venue": null, "authors": null, "abstract": "As the ageing population intensifies, the Long-term Care Insurance (LTCI) policy, which serves as a crucial measure to alleviate the demand for informal care, has garnered widespread attention. This study investigates the impact of the LTCI on family fertility behaviour using data from the China Family Panel Studies. The difference-in-differences regression results show that the implementation of the LTCI pilot policy significantly increased the fertility probability and intentions of families in pilot areas. Notably, the impact of the LTCI on family fertility behaviour varies significantly depending on whether it is held by younger or older family members. Specifically, the LTCI increases family fertility probability when held by younger family members but decreases it when held by older family members. We conduct a series of mechanism analyses to explain these findings. This study enriches our understanding of how social security policies such as LTCI influence family fertility behaviour, highlighting the underlying mechanisms and providing valuable insights into the broader implications of demographic and economic trends.", "is_gold": true, "tier": 1, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "fertility probability and intentions", "mechanism": "long-term care insurance reduces reliance on children for old-age care", "direction": "forward", "reason": "DiD estimate of LTCI (old-age social insurance) on family fertility behaviour in China", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20impact%20of%20long-term%20care%20insurance%20on%20family%20fertility%20behaviour%3A%20evidence%20from%20China"}, {"id": "W2107888072", "group": "pooling", "title": "The Impact of Social Security on Saving and Fertility in Germany", "year": null, "venue": null, "authors": null, "abstract": "Estimating saving and fertility simultaneously by the VAR method, we find that social security coverage has a positive effect on household saving, and a negative effect on fertility. In Germany, as in other countries where the hypothesis was tested, social security is thus good for growth. A possible explanation for this unconventional finding is that compulsory saving in the form of pension contributions tends to displace intrafamily transfers, rather than conventional asset formation. However, the negative effect of social security on fertility tends to erode the systems own contributory base, because it reduces the number of future contributors. That is one of the reasons why, in Germany as elsewhere, the pay-as-you-go pension system is financially brittle. To some extent, that is counteracted by child-related benefits, which tend to encourage fertility, but some retrenchment on the pension front appears to be unavoidable.", "is_gold": true, "tier": 1, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "social security displaces intrafamily/old-age transfers", "direction": "forward", "reason": "VAR-based empirical estimate of social security's negative effect on fertility in Germany", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Impact%20of%20Social%20Security%20on%20Saving%20and%20Fertility%20in%20Germany"}, {"id": "W4307711611", "group": "pooling", "title": "The Old-Age Security Motive for Fertility: Evidence from the Extension of Social Pensions in Namibia", "year": null, "venue": null, "authors": null, "abstract": "The old-age security motive for fertility postulates that people’s needs for old-age support raise the demand for children. We exploit the extension of social pensions in Namibia during the 1990s to provide a quasi-experimental quantification of this widespread idea. The reform eliminated inequalities in pension coverage and benefits across regions and ethnic groups. Combining differences in pre-reform pensions and differences in exposure across cohorts, we show that pensions substantially reduce fertility, especially in late reproductive life. The results suggest that improving social protection for the elderly could go a long way in fostering fertility decline in sub-Saharan Africa. (JEL H55, I38, J13, J14, O15)", "is_gold": true, "tier": 1, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "old-age security / social pension extension", "direction": "forward", "reason": "Quasi-experimental estimate of social pension extension reducing fertility in Namibia — the forward OAS→fertility cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Old-Age%20Security%20Motive%20for%20Fertility%3A%20Evidence%20from%20the%20Extension%20of%20Social%20Pensions%20in%20Namibia"}, {"id": "W1590954098", "group": "pooling", "title": "The Role of Social Security in Household Decisions: VAR Estimates of Saving and Fertility Behaviour in Germany", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": true, "tier": 1, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility and saving", "mechanism": "social security in household decisions", "direction": "forward", "reason": "VAR estimates of social security effects on saving and fertility in Germany; empirical forward", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Role%20of%20Social%20Security%20in%20Household%20Decisions%3A%20VAR%20Estimates%20of%20Saving%20and%20Fertility%20Behaviour%20in%20Germany"}, {"id": "W1512976090", "group": "pooling", "title": "What Explains Fertility? Evidence from Italian Pension Reforms", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": true, "tier": 1, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "pension reform / old-age security", "direction": "forward", "reason": "Evidence from Italian pension reforms on fertility; forward quasi-experimental estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=What%20Explains%20Fertility%3F%20Evidence%20from%20Italian%20Pension%20Reforms"}, {"id": "W2006194183", "group": "pooling", "title": "A reappraisal of the social security-fertility hypothesis: A bidirectional approach", "year": null, "venue": null, "authors": null, "abstract": "There has been considerable debate in the literature regarding the social security-fertility hypothesis. By analyzing 81 countries for which data was available, numerous econometric models were developed to test both the relative importance of social security as a causal factor affecting fertility and the subsequent effect of lower fertility levels on social security expenditures. By controlling for economic development and testing the model at different points in time, the social security variable was found to be causally linked to subsequent fertility levels as well as fertility levels being causally linked to subsequent social security expenditures. Furthermore, the appropriate response lag was identified and various nonlinear functional forms were utilized to control for economic development. Finally, a Chow test was employed to show the existence of structural change between the developed and less developed nations.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility levels", "mechanism": "social security as old-age support crowd-out", "direction": "forward", "reason": "Cross-country empirical test of social security causally lowering fertility (also tests reverse); forward effect on fertility is the primary cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=A%20reappraisal%20of%20the%20social%20security-fertility%20hypothesis%3A%20A%20bidirectional%20approach"}, {"id": "W2382108032", "group": "pooling", "title": "An Empirical Study of the Fertility Rate Adjustment Feasibility by the Social Security Level", "year": null, "venue": null, "authors": null, "abstract": "To China,whether the Fertility rate can be adjusted through the level of social security,or how adjusted has been an important task in research. By applying to the method of Granger causality test between China's social security level and Fertility rate data from 1989 to 2010,we come to the result that the social security level is Granger reason for Fertility rate. Combined with this adjustment,the autoregressive distributed lag model is constructed,and the model shows that the level of social security can effectively reduce the Fertility rate and if we keep the level of social security unchanged,the Fertility rate will show a declining trend.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility rate", "mechanism": "higher social-security level substitutes for children as old-age support, lowering fertility", "direction": "forward", "reason": "Granger causality and ARDL estimate that social-security level reduces fertility, forward direction", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=An%20Empirical%20Study%20of%20the%20Fertility%20Rate%20Adjustment%20Feasibility%20by%20the%20Social%20Security%20Level"}, {"id": "W1846122930", "group": "pooling", "title": "An Empirical Test of the Effect of Social Security on Fertility in the United States", "year": null, "venue": null, "authors": null, "abstract": "The author attempts to estimate the effects of the social security program on fertility in the United States from 1933 to 1974. A fertility model based on the choice theoretic calculus is presented, \"with the distinguishing feature that the childbearing cohort's utility depends on own consumption as well as consumption of their retired parents. In this framework, changes in social security affect household income, and thus fertility, directly, as well as indirectly due to substitution of social security for private intergenerational transfers.\"", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "social security substituting private intergenerational transfers", "direction": "forward", "reason": "empirical estimate of US social security effect on fertility, forward direction", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=An%20Empirical%20Test%20of%20the%20Effect%20of%20Social%20Security%20on%20Fertility%20in%20the%20United%20States"}, {"id": "W2606207160", "group": "pooling", "title": "Bismarck in the bedroom? Pension reform and fertility: Evidence 1870-2010", "year": null, "venue": null, "authors": null, "abstract": "Rising public pension generosity has frequently been cited as one reason for the (persistently) declining fertility rates in many advanced economies. Despite the theoretical appeal, empirical evidence on the pension-fertility nexus is limited. To fill this gap, I study country-level fertility trends before and after 23 pension reforms using a long-run panel dataset starting in 1870. In addition to the raw fertility rate (birth per women aged 15-49), I examine the residuals of a fertility regression, which capture variations in the fertility rate that cannot be explained by alternative theories of the historical fertility decline. Contrasting pre- and post-reform trends of the raw fertility rate as well as the fertility regression residual across countries, I do not find robust evidence that pension reforms, on average, affect fertility in the way most theoretical models predict. On the individual country level, however, some reforms are indeed associated with a significant structural break in fertility trends that is in line with the old-age security hypothesis. Varying social ties might provide an explanation for the different country-specific fertility reactions to pension reforms.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility rate", "mechanism": "pension generosity / old-age-security hypothesis", "direction": "forward", "reason": "Long-run cross-country panel testing effect of 23 pension reforms on fertility; forward empirical estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Bismarck%20in%20the%20bedroom%3F%20Pension%20reform%20and%20fertility%3A%20Evidence%201870-2010"}, {"id": "W2995464673", "group": "pooling", "title": "Bismarck to no effect: Fertility decline and the introduction of social insurance in Prussia", "year": null, "venue": null, "authors": null, "abstract": "Economists have long argued that introducing social insurance will reduce fertility. The hypothesis relies on standard models: if children are desirable in part because they provide security in case of disability or old age, then state programs that provide insurance against these events should induce couples to substitute away from children in the allocation of wealth. We test this claim using the introduction of social insurance in Germany in the 1880s and 1890s. Bismarck’s social-insurance system provided health insurance, workplace-accident insurance, and old age pensions to a majority of the working population. The German case appeals because the social insurance program started on a large scale and was compulsory for covered classes of workers, and because fertility in Germany in this period was still relatively high. Focusing on the state of Prussia, we estimate differences-in-differences models that ask whether marriage and marital fertility reacted to the introduction or extension of the main social insurance programs. For Prussia as a whole we find little impact.", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "marital fertility / marriage", "mechanism": "introduction of Bismarck social insurance (old-age pensions)", "direction": "forward", "reason": "DiD estimate of social-insurance introduction on fertility in Prussia; core forward empirical cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Bismarck%20to%20no%20effect%3A%20Fertility%20decline%20and%20the%20introduction%20of%20social%20insurance%20in%20Prussia"}, {"id": "W7135853640", "group": "pooling", "title": "Children and old age security", "year": null, "venue": null, "authors": null, "abstract": "There have been a great deal of ways for old age security, who is expected and individual situation. Old age signify loss of income from economics activity. We can compare ways of securing for old age by their liquidity, rate of profit and diversification, but it is impossible to administratively determine composition of the optimal old age security portfolio, whereas administrative favoured one's way, entails limitation of the others. One of the oldest way of securing for old age is child care and enlinghtenment. The research pointed to existence disputation between theories of fertility development. These theories are attaching different importance to the particular biological, socioeconomic and cultural factors. Empirical research of fertility development and its factors in czech lands, represents pure administrative character of the pension insurance development. Spending on pension insurance and some other factors are influencing development of fertility. This influence is analyzed in years 1930- 2009. Analysis provides evidence of pension insurance influencing level of fertility significantly. Theories of fertility development often impeaching this influence. The work apply findings to the primary objectives for pension reform in Czech republic. This pension reform provides sustainable pension system position and possibility for individuals to set up their optimal old age security portfolio.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "pension insurance spending as old-age security", "direction": "forward", "reason": "Analyzes pension-insurance spending influencing fertility in Czech lands 1930-2009; forward empirical effect of old-age security on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Children%20and%20old%20age%20security"}, {"id": "W1625570086", "group": "pooling", "title": "Children, support in old age and social insurance in rural China", "year": null, "venue": null, "authors": null, "abstract": "Most people in rural China have no plans for retirement other than the ingrained Chinese tradition that children care for old parents. Actually there are also no sources of social support such as social old-age insurance to rely on in rural people’ old age for a long time in China. In 1992, a social old-age insurance program, rural pension program, was initiated by the Chinese government to firstly establish a social security system in China’s rural area. The rural pension program experienced rapid development in the beginning years but grounded to halt after 1998. Since either children or pension program provides support for elderly, we expected that these two can be viewed as substitutes to some extent. Using data from China’s 2005 mini-census, we find that rural people who have at least one son are less likely to participate in pension program and each additional son and daughter both decreases their participation rate. Moreover, the effect of an additional son is much larger than that of an additional daughter. In addition, both evidence from mini-census and China Health and Retirement Longitudinal Study show that peasants accessing to pension are less likely to rely on their children for support in old age. These findings suggest that demand for children, especially for sons are partly driven by concerns relating to care in old age; children and formal social old-age insurance are substitutes for support in old age. We then expect that implementation of social old-age insurance may mitigate rural people’ demand for children, especially sons and thus correct China’s severe sex ratio bias to some extent. We test this hypothesis using the difference-in-differences strategy, and find that increase of sex ratio at the region level slowed down after the implementation of", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "demand for children / son preference / sex ratio", "mechanism": "rural pension program substituting for children as old-age support", "direction": "forward", "reason": "DiD/observational evidence that rural pensions substitute for children in old age and reduce demand for children, forward on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Children%2C%20support%20in%20old%20age%20and%20social%20insurance%20in%20rural%20China"}, {"id": "W7161025843", "group": "pooling", "title": "Data and Code for: The Old-Age Security Motive for Fertility: Evidence from the Extension of Social Pensions in Namibia", "year": null, "venue": null, "authors": null, "abstract": "The old-age security motive for fertility postulates that people's needs for old-age supportraise the demand for children. We exploit the extension of social pensions in Namibiaduring the nineties to provide a quasi-experimental quantification of this widespread idea.The reform eliminated inequalities in pension coverage and benefits across regions andethnic groups. Combining differences in pre-reform pensions and differences in exposureacross cohorts, we show that pensions substantially reduce fertility, especially in latereproductive life. The results suggest that improving social protection for the elderlycould go a long way in fostering fertility decline in Sub-Saharan Africa.", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "extension of social pensions / old-age security", "direction": "forward", "reason": "Quasi-experimental evidence from Namibia's social-pension extension showing pensions substantially reduce fertility; the core primary estimand.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Data%20and%20Code%20for%3A%20The%20Old-Age%20Security%20Motive%20for%20Fertility%3A%20Evidence%20from%20the%20Extension%20of%20Social%20Pensions%20in%20Namibia"}, {"id": "W1597299047", "group": "pooling", "title": "Did Rising Out-Migration Cause Fertility to Decline in Antebellum New England? A Life-Cycle Perspective on Old-Age Security Motives, Child Default, and Farm-Family Fertility", "year": null, "venue": null, "authors": null, "abstract": "A model of fertility based on the life-cycle model of intertemporal optimization is presented in which fertility, children's schooling, saving, and bequest planning are simultaneously determined. The paper hypothesizes that sometime shortly after the beginning of the nineteenth century, Americans began to adopt this life-cycle strategy and abandon the older, traditional family-based system of providing for old age. As a consequence the overall fertility rate began to fall. The change in attitudes was, it is argued, triggered by the high incidence of 'child default' as young adults left the seaboard states for land in the west. The change to life-cycle strategies was gradual and proceeded at different rates in different parts of the country. This differential timing of the 'life-cycle transition' allows empirical tests to be based on cross-sections of state data drawn from the 1840 U.S. Census. The model is shown to predict well. An alternative hypothesis, Richard Easterlin's 'target-bequest model' is rejected by these tests.", "is_gold": false, "tier": 2, "evidence_type": "structural", "cell": "PRIMARY", "outcome": "fertility (farm-family)", "mechanism": "old-age security motive / child default, life-cycle strategy", "direction": "forward", "reason": "Life-cycle model of old-age-security motive tested on 1840 census cross-sections predicting fertility decline; forward empirical test of OAS motive on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Did%20Rising%20Out-Migration%20Cause%20Fertility%20to%20Decline%20in%20Antebellum%20New%20England%3F%20A%20Life-Cycle%20Perspective%20on%20Old-Age%20Security%20Motives%2C%20Child%20Default%2C%20and%20Farm-Family%20Fertility"}, {"id": "W4403023195", "group": "pooling", "title": "Does parents’ retirement influence the fertility intentions of subsequent generations among internal migrant populations? Evidence from China", "year": null, "venue": null, "authors": null, "abstract": "OBJECTIVES: The fertility health of the migrating population has attracted significant attention. This article examines the impact of parental retirement on the fertility intentions of the offspring among the internal migrant population. METHODS: This study utilizes the mandatory retirement age system as an exogenous shock within a fuzzy regression discontinuity (FRD) experimental design to investigate the influence of parents' retirement on the fertility intentions of their migrant offspring and potential mechanisms. RESULTS: The research findings indicate that parents' retirement significantly reduces the fertility intentions of the migrant population by 34.4%. Mechanism analysis attributes this adverse effect to the reduction in intergenerational wealth transfer due to parent's retirement. As the family's economic situation worsens, the negative impact of retirement on fertility intentions becomes more pronounced. The childcare support mechanism provided by retired grandparents can partially offset the adverse effects of the income mechanism. CONCLUSIONS: This study provides recommendations for enhancing policies related to delaying retirement age and childcare.", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "fertility intentions of migrant offspring", "mechanism": "parental retirement -> intergenerational wealth transfer (partly offset by grandparental childcare)", "direction": "forward", "reason": "Fuzzy-RD on mandatory retirement estimates forward effect of parental retirement/pension on offspring fertility intentions.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Does%20parents%E2%80%99%20retirement%20influence%20the%20fertility%20intentions%20of%20subsequent%20generations%20among%20internal%20migrant%20populations%3F%20Evidence%20from%20China"}, {"id": "W7161597634", "group": "pooling", "title": "Does Social Security Coverage Shape Fertility Intentions? Evidence from the China General Social Survey", "year": null, "venue": null, "authors": null, "abstract": "This study uses data from the 2023 China General Social Survey (CGSS), a nationally representative survey covering individuals’ demographic characteristics, socioeconomic status, family background, social attitudes, and participation in public services. The analysis focuses on respondents with valid information on fertility intentions, social security coverage, and related control variables. The main dependent variable is fertility intention, and the key explanatory variable is social security coverage. The dataset also allows for heterogeneity analysis across income groups, gender, urban-rural populations, and households with or without children.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility intentions", "mechanism": "social security coverage (old-age-security crowd-out)", "direction": "forward", "reason": "CGSS study estimating social security coverage on fertility intentions, forward", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Does%20Social%20Security%20Coverage%20Shape%20Fertility%20Intentions%3F%20Evidence%20from%20the%20China%20General%20Social%20Survey"}, {"id": "W3123572076", "group": "pooling", "title": "Fertility decisions and pension reforms. Evidence from natural experiments in Italy", "year": null, "venue": null, "authors": null, "abstract": "The emergence of old-age social security has been linked to general fertility decline, and in recent years pension reforms have emerged as a response to the challenges of population ageing, in turn partially a consequence of fertility decline. Understanding the link between social security and low fertility is therefore very important. In this paper we analyse the link between fertility and social security in a novel way. We exploit a series of pension reforms that were implemented in Italy, one of the first âlowest-lowâ fertility societies, during the 1990s, to test the effect of expected retirement income on fertility. The design of the reforms, which introduced a discontinuity depending on the numbers of years of contributions, allows considering them as a natural experiment. We analyse fertility data reconstructed from a series of surveys from the Bank of Italy and show that couples in which the husband was affected by the reform, therefore facing a lower pension, had subsequently higher fertility.", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "couple fertility (births)", "mechanism": "expected pension/retirement income (old-age-security crowd-out)", "direction": "forward", "reason": "Italian pension-reform natural experiment estimates effect of expected pension on fertility, forward", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Fertility%20decisions%20and%20pension%20reforms.%20Evidence%20from%20natural%20experiments%20in%20Italy"}, {"id": "W4391684015", "group": "pooling", "title": "Fertility decisions and the norm of intergenerational support to aging parents", "year": null, "venue": null, "authors": null, "abstract": "Abstract This paper examines the impact of the social norm of intergenerational support to aging parents on fertility decisions in developing economies. The traditional expectation of receiving support from adult children in old age has historically been a significant factor in the decision to have children, especially in developing countries. The study develops a life cycle model that endogenizes fertility choices and incorporates the expectation of transfers from children based on the filial responsibility norm. We utilize household survey data from Indonesia to estimate earnings profiles and uncertainties over the life cycle, and to estimate the transfers from adult children to parents to indicate the current strength of the norm in 2000s. We conducted counterfactual experiments to explore the impact of the filial responsibility norm on fertility and found that a weakening of the norm could account for a significant proportion of the decline in the total fertility rate.", "is_gold": false, "tier": 2, "evidence_type": "structural", "cell": "PRIMARY", "outcome": "total fertility rate", "mechanism": "weakening filial-responsibility (old-age support) norm reduces value of children, lowering fertility", "direction": "forward", "reason": "life-cycle model estimated on Indonesian data with counterfactuals quantifying norm's effect on fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Fertility%20decisions%20and%20the%20norm%20of%20intergenerational%20support%20to%20aging%20parents"}, {"id": "W1530069702", "group": "pooling", "title": "Fertility Effects of the Pension System and Other Intergenerational Transfers: Test on Hungarian Data", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "pension system and intergenerational transfers crowd out old-age support motive", "direction": "forward", "reason": "Empirical test of pension-system and intergenerational-transfer effects on fertility (Hungarian data); forward effect on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Fertility%20Effects%20of%20the%20Pension%20System%20and%20Other%20Intergenerational%20Transfers%3A%20Test%20on%20Hungarian%20Data"}, {"id": "W1983191203", "group": "pooling", "title": "Fertility impact of high-coverage public pensions in sub-Saharan Africa", "year": null, "venue": null, "authors": null, "abstract": "The potential link between child-related cash transfers and increased fertility is often raised as an issue of concern in debates as to their use. Old age pensions are a form of cash transfer where theory would suggest the opposite impact, namely, pensions equalling decreasing fertility. A handful of sub-Saharan African countries have introduced non-contributory social pensions that cover the great majority of the older population. This makes these countries a distinctive group in relation to the rest of the region, where public old age security arrangements, if they exist at all, are largely confined to the formal sector. This article attempts to trace the impact these high-coverage pension schemes may have had on fertility. The findings suggest there has been such an impact, to the extent of 0.5 to 1.5 fewer children per woman, depending on model specification. However, data limitations and methodological concerns require that the results be interpreted cautiously.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility (children per woman)", "mechanism": "high-coverage non-contributory public pensions", "direction": "forward", "reason": "Estimates pension coverage reducing fertility by 0.5-1.5 children in Sub-Saharan Africa; forward empirical effect on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Fertility%20impact%20of%20high-coverage%20public%20pensions%20in%20sub-Saharan%20Africa"}, {"id": "W2163084143", "group": "pooling", "title": "Fertility Impact of Social Transfers in Sub-Saharan Africa – What About Pensions?", "year": null, "venue": null, "authors": null, "abstract": "The potential link between child-related cash transfers and increased fertility is often raised asan issue of concern when debating their use. Old-age pension is a form of cash transfer wheretheory would suggest the opposite impact, i.e. pensions equal decreasing fertility. A handful ofSub-Saharan African countries have introduced non-contributory social pensions that cover thegreat majority of the older population. It makes them into a distinct group in relation to the rest ofthe region where public old-age security arrangements, if existing at all, are largely reserved forthe formal sector. This paper attempts to trace any impact these high-coverage pensionschemes may have had on fertility. Findings suggest that there has been such an impact, in therange of 0,5 to 1,5 children less per woman depending on model specification.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility (children per woman)", "mechanism": "high-coverage non-contributory social pensions", "direction": "forward", "reason": "Working-paper version tracing pension impact on fertility in Sub-Saharan Africa; forward empirical estimate on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Fertility%20Impact%20of%20Social%20Transfers%20in%20Sub-Saharan%20Africa%20%E2%80%93%20What%20About%20Pensions%3F"}, {"id": "W4400936083", "group": "pooling", "title": "FERTILITY REDUCTION AS A METHOD OF POPULATION ADAPTATION TO PENSION SYSTEM DYNAMIC CHANGE", "year": null, "venue": null, "authors": null, "abstract": "Статья посвящена выявлению взаимосвязи между динамичным изменением пенсионной системы в России, в частности повышением пенсионного возраста, и рождаемостью. Автор исходит из того, что не только увеличение доли занятых женщин негативно влияет на рождаемость, но и удлинение периода занятости. Прежде всего, автор провел анализ показателя рождаемости и выявил, что через 9 месяцев после принятия закона, повышающего возраст выхода на пенсию, рождаемость действительно снизилась, хотя других социально-экономических потрясений в тот период не было. Для доказательства своей гипотезы автор использует результаты всероссийского социологического опроса женщин фертильного возраста, предпринятого им в 2020 году. Результаты опроса показали, что 20,6% женщин планируют отказаться от рождения ребенка из-за того, что нужно беречь силы для работы. Далее была выявлена доля занятых женщин, чья работа, по их мнению, не позволяет им иметь столько детей, сколько они хотели бы. На основе результатов опроса и использования статистических данных автором проведены расчеты максимального числа нерожденных детей по причине того, что занятость женщины не позволяет ей реализовать свое материнство. The article is devoted to identifying the relationship between the dynamic changes in the Russian pension system, the retirement age increase in particular, and fertility. The author hypothesizes that not only the employed women share increase affects negatively the birth rate, but also the employment period lengthening. First of all, the author analyzed the birth rate and found that 9 months after the law on raising the retirement age adoption, the birth rate really decreased, although there were no other socio-economic shocks during that period. To prove his hypothesis, the author uses the results of an all-Ru", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "birth rate / planned childbearing", "mechanism": "retirement-age increase lengthening women's employment period", "direction": "forward", "reason": "Empirical analysis of Russia's retirement-age reform on the birth rate plus survey evidence; forward pension-policy -> fertility estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=FERTILITY%20REDUCTION%20AS%20A%20METHOD%20OF%20POPULATION%20ADAPTATION%20TO%20PENSION%20SYSTEM%20DYNAMIC%20CHANGE"}, {"id": "W2181863141", "group": "pooling", "title": "Fertility, contraceptive use and intra-familial transfers in rural Malawi", "year": null, "venue": null, "authors": null, "abstract": "Using data from Malawi Diffusion and Ideation Change Project (1998) and Family Transfers Project (1999), this paper examines whether in rural Malawi fertility or its major proximate determinant, contraceptive use is responsive to the direction of net transfers. Malawi is an appropriate place to test the theory since the absence of social security-type programs makes children, the elderly and those who are ill to depend on family members for assistance. This paper improves on a similar analysis on a comparable country, Kenya, by including transfers of time and money. Net flows between children and their parents are upward with the amount of transfers from children to their parents exceeding the amount given to their parentsin-laws. The results have also shown that sons give more to their parents and parents-in-laws than daughters. Using Caldwell’s theory of wealth flows as a point of departure, the results have shown that for some issues money matters, for others time, for some it is one parent or parent-in-law, but for others a different category. Overall, transfers have no significant effect on contraceptive use and fertility.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility and contraceptive use", "mechanism": "old-age support via intra-familial (upward) transfers in absence of social security", "direction": "forward", "reason": "Directly tests the old-age-support/wealth-flows motive: whether fertility responds to net transfer direction where social security is absent.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Fertility%2C%20contraceptive%20use%20and%20intra-familial%20transfers%20in%20rural%20Malawi"}, {"id": "W1512323099", "group": "pooling", "title": "Has social security influenced family formation and fertility in OECD countries? An economic and econometric analysis", "year": null, "venue": null, "authors": null, "abstract": "There is growing concern about a decline in the total fertility rate worldwide, but nowhere is the concern greater than in OECD countries, some of which already face the prospect of population decline as well. While the trend is largely the result of structural economic and social changes, our paper indicates that it is partly influenced by the scale of the defined-benefits, pay-as-you-go (PAYG) social security systems operating in most countries. Through a dynamic, overlapping-generations model where the generations are linked by parental altruism, we show analytically that social security tax and benefit rates generate incentives for individuals to reduce not just the fertility rate within families, but also the incentive to form families, which we capture empirically by the fraction of adults married. We conduct calibrated simulations as well as regression analyses that measure the quantitative importance of social security tax rates in lowering both net marriage and total fertility rates. Our results show that the impact of social security on these variables has been non-trivial. We also offer policy implications concerning the desirable way to reform the current social security system in order to mitigate its unintended effects on family formation and fertility and improve its financial solvency.", "is_gold": false, "tier": 2, "evidence_type": "structural", "cell": "PRIMARY", "outcome": "total fertility rate and marriage rate", "mechanism": "PAYG social security taxes/benefits substitute for children as old-age support, reducing fertility", "direction": "forward", "reason": "OLG model plus regressions estimating social-security effect on fertility, forward direction", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Has%20social%20security%20influenced%20family%20formation%20and%20fertility%20in%20OECD%20countries%3F%20An%20economic%20and%20econometric%20analysis"}, {"id": "W2332460960", "group": "pooling", "title": "High Fertility as Risk-Insurance", "year": null, "venue": null, "authors": null, "abstract": "Abstract Recently ‘insurance against risk’ has been proposed as a major addition to the list of economic supports for a high perceived value of children in poor South Asian countries. That is, that children provide a vital insurance policy for poor couples against the many hazards and risks to which they are subject. This argument is plausible and has proved appealing. If correct, it implies that demand for children will remain high (and contraceptive practice low) until the climate of risk has been substantially altered through public policy. This article examines this proposition critically with respect to the underlying logic and also subjects the proposition to historical and cross-sectional empirical test. We conclude that there are serious conceptual and theoretical weaknesses in the basic argument which cast serious doubt on its validity. Also the empirical tests undertaken lead us to reject the hypothesis. We conclude that the ‘risk’ notion adds nothing to fertility theory and that it remains to be established that comprehensive social security schemes are a necessary condition for fertility decline.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "children as old-age/risk insurance; social security as substitute", "direction": "forward", "reason": "Historical and cross-sectional empirical test of the old-age/risk-insurance motive for high fertility and whether social security is needed for fertility decline.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=High%20Fertility%20as%20Risk-Insurance"}, {"id": "W2739032792", "group": "pooling", "title": "Impact of social security on fertility – a panel data analysis", "year": null, "venue": null, "authors": null, "abstract": "Falling fertility rates, ageing population and their consequences on the economy are in center of attention of economists for quite some time. Some of the problems are emerging in social security programs, due to financial vulnerability of PAYG systems of pension insurance, a common system in a great number of countries. Since Croatia has a PAYG system for the first and biggest pillar of pension insurance, we examine theoretical and empirical research of interactions between PAYG benefits and total fertility rate. Results suggest that PAYG systems should have been taken into account when making policies for stimulating fertility.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "total fertility rate", "mechanism": "PAYG social security / pension benefits", "direction": "forward", "reason": "Panel-data empirical analysis of PAYG social security benefits on total fertility rate; forward pension -> fertility estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Impact%20of%20social%20security%20on%20fertility%20%E2%80%93%20a%20panel%20data%20analysis"}, {"id": "W3007724749", "group": "pooling", "title": "INCOME, SOCIAL SECURITY AND CHINESE FAMILIES’ “TWO-CHILD” DECISIONS: EVIDENCE FROM URBAN RESIDENTS’ FERTILITY INTENTIONS", "year": null, "venue": null, "authors": null, "abstract": "The increase in income, the improvement of social security and the decline in the desire for fertility in urban residents have been extremely important social and economic phenomena in China over the past three decades. However, there have been few studies of China’s situations because of the use of long-term birth control. An analysis based on the framework of lifetime utility maximization for individuals indicated that income and social security have substitution effects on the number of births. This study conducts an empirical analysis with data extracted from the Chinese General Social Survey (CGSS). The results show that an increase in income lowers the willingness for fertility, and the endowment insurance system with subsidies lowers beneficiaries’ fertility intentions. Similarly, an increase in income and the improvement of social security decrease urban residents’ “two-child” fertility intentions significantly. Thus, although the steady growth of the economy and the continuous improvement of the social security system have provided the opportunity to relax China’s population policies, the substitution effect of income and social security on fertility intentions also needs to be considered.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility intentions / two-child decisions", "mechanism": "social-security substitution effect on demand for children", "direction": "forward", "reason": "CGSS analysis finds endowment insurance/social security lowers urban residents' fertility intentions; forward empirical estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=INCOME%2C%20SOCIAL%20SECURITY%20AND%20CHINESE%20FAMILIES%E2%80%99%20%E2%80%9CTWO-CHILD%E2%80%9D%20DECISIONS%3A%20EVIDENCE%20FROM%20URBAN%20RESIDENTS%E2%80%99%20FERTILITY%20INTENTIONS"}, {"id": "W2735326742", "group": "pooling", "title": "Influence of women’s workforce participation and pensions on total fertility rate: a theoretical and econometric study", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "total fertility rate", "mechanism": "pensions and women's workforce participation", "direction": "forward", "reason": "Theoretical-and-econometric study of the effect of pensions (and female labor participation) on TFR; provides a forward empirical estimate on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Influence%20of%20women%E2%80%99s%20workforce%20participation%20and%20pensions%20on%20total%20fertility%20rate%3A%20a%20theoretical%20and%20econometric%20study"}, {"id": "W4399643577", "group": "pooling", "title": "Level of Urbanization, Social Security Satisfaction and Fertility Intentions", "year": null, "venue": null, "authors": null, "abstract": "Using the data from the China Social Situation Survey (CSS2021), we investigated the effect of social security satisfaction on fertility intention of people of childbearing age. Using OLS model and ordered probit model for regression, it is found that there is an inverted U-shaped curve relationship between social security satisfaction and fertility intention of people of childbearing age, which is \"increasing first and then decreasing\", and when social security satisfaction has not crossed the inflection point, it is in the stage of facilitating the influence on fertility intention; after interacting social security satisfaction with urbanization level, it has a certain inhibiting effect on fertility intention; after interacting social security satisfaction with urbanization level, it has a certain inhibiting effect on fertility intention. When social security satisfaction has not crossed the inflection point, it is in the promotion stage; after interacting social security satisfaction with urbanization level, it has a certain inhibiting effect on fertility intentions; after analyzing the heterogeneity, it is found that social security satisfaction has different degrees of influence on the fertility intentions of people of different ages and different regions, and the influence on the fertility intentions of the young group and rural residents is the greatest. Based on this, the government should prevent the spillover of the benefits of childbearing, reduce the cost of childbearing for the residents, build a birth-friendly society, and promote the synergistic and high-quality development of population and social security in China.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility intentions", "mechanism": "social security satisfaction / provision", "direction": "forward", "reason": "Estimates forward effect of social-security satisfaction on fertility intentions (OLS/ordered probit) in China.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Level%20of%20Urbanization%2C%20Social%20Security%20Satisfaction%20and%20Fertility%20Intentions"}, {"id": "W1598068461", "group": "pooling", "title": "Old Age Pensions Public Expenditures and Fertility in European Countries", "year": null, "venue": null, "authors": null, "abstract": "The economic theory of fertility acknowledges the importance of old age pensions for individual fertility decisions. However, theoretical predictions regarding the sign of this relation differ from altruistic fertility models (positive) to non-altruistic fertility models (negative). First, a cointegration analysis is employed in order to check if there is a long-term equilibrium relationship between public spending on old age pensions and the fertility rate, using a sample of 30 European countries. Second, this relation is estimated using the generalized method of moments for dynamic panel data. The results confirm the predictions of altruistic fertility models. Old age pensions public expenditures are found to have a positive effect on the fertility rate, but with a low magnitude.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility rate", "mechanism": "old-age pension public expenditures", "direction": "forward", "reason": "Cointegration and dynamic-panel GMM estimating pension expenditure effect on fertility across 30 European countries; forward empirical estimate on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old%20Age%20Pensions%20Public%20Expenditures%20and%20Fertility%20in%20European%20Countries"}, {"id": "W1965959030", "group": "pooling", "title": "Old age security and the utility of children in Rural India", "year": null, "venue": null, "authors": null, "abstract": "Summary This study investigates old age security as a possible motivation for high fertility, using information gathered by means of questionnaires and participant observation in an Indian village during 1975-76. Results indicated that such motivation may be quite weak, and hence that population policies aimed at lowering the economic value of children through public social security programmes would achieve little. A variety of evidence pointed to the importance of economic assets, mainly land, in assuring security in old age rather than an abundance of sons. Moreover, given a low expectation of life the necessity to provide support to the aged was infrequent, a fact which seemed to be appreciated by the surveyed villagers.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility (number of children / son preference)", "mechanism": "old-age-security motive for children", "direction": "forward", "reason": "Village-level empirical study directly assessing whether the OAS motive drives high fertility, forward on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old%20age%20security%20and%20the%20utility%20of%20children%20in%20Rural%20India"}, {"id": "W2211962715", "group": "pooling", "title": "Old Age Security Value of Children and Development: Cross-National Evidence", "year": null, "venue": null, "authors": null, "abstract": "This paper presents some of the findings of the nine-country “Value of Children Study” pertaining to the perceived value of children in providing old-age security to their parents. To what extent this value is attributed by parents to their children and what benefits are expected from children are assessed in thecontext of socio-economic development. Specifically, it is found that with development the old-age security value of the child decreases, which appears to be a key process contributing to lower fertility as well as to the modification of values concerning the place of the child and the care of the aged in society. Thus, the value attributed to the child forms an explanatory link at the individual level between development and declining fertility.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "perceived old-age-security value of children", "direction": "forward", "reason": "Cross-national Value of Children evidence linking OAS value of children to fertility, forward direction.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old%20Age%20Security%20Value%20of%20Children%20and%20Development%3A%20Cross-National%20Evidence"}, {"id": "W4399827198", "group": "pooling", "title": "Old Age Security: Impacts of Social Security Systems on Households’ Fertility Decisions", "year": null, "venue": null, "authors": null, "abstract": "The social security system is one of the biggest government public expenditures across countries with diverse influences on people’s daily lives. In this study, longitudinal household survey data from the China Health and Retirement Longitudinal Study are used to examine the influence of social security systems on households’ fertility decisions. Using the method of regression analysis, the impact of three types of social security systems are investigated: pensions, medical insurance, and reimbursements. It is found that social security systems significantly decrease the number of children per household. However, it does not affect households’ gender preferences and fails to achieve gender balance as reflected in the more-than-average number of male children across time. These findings afford valuable insights for the government in formulating social security policies while concurrently addressing the decreasing fertility rate in recent years.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "number of children per household", "mechanism": "social security systems (pensions, medical insurance)", "direction": "forward", "reason": "CHARLS regression finds social security significantly decreases number of children; forward empirical effect on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old%20Age%20Security%3A%20Impacts%20of%20Social%20Security%20Systems%20on%20Households%E2%80%99%20Fertility%20Decisions"}, {"id": "W2211089790", "group": "pooling", "title": "Old age, risk, security and children: an empirical evidence from rural India.", "year": null, "venue": null, "authors": null, "abstract": "An investment model of the demand for children is developed to demonstrate that old-age security provided by children is an important consideration in the fertility decisions of parents. \"The paper is organized as follows: Section II presents the importance of children as a source of old age support and risk mitigating mechanism. The investment approach for the demand for children is presented in Section III. Section IV...explores the implications in the context of a recent household survey conducted in rural India. Finally, the findings are summarised in Section V.\"", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "demand for children / fertility", "mechanism": "children as old-age security and risk mitigation", "direction": "forward", "reason": "Investment model of demand for children tested on rural India household survey; old-age-security motive -> fertility, forward empirical.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old%20age%2C%20risk%2C%20security%20and%20children%3A%20an%20empirical%20evidence%20from%20rural%20India."}, {"id": "W2170777707", "group": "pooling", "title": "Old-Age Security Value of Children", "year": null, "venue": null, "authors": null, "abstract": "Some of the findings of the nine-country \"Value of Children Study\" pertaining to the perceived value of children in providing old-age security to their parents are presented. To what extent this value is attributed by parents to their children and what benefits are expected from children were assessed in the context of socioeconomic development. Specifically, it was found that with development, the old-age security value of the child decreases, which appears to be a key process contributing to lower fertility as well as to the modification of values concerning the place of the child and the care of the aged in society. Thus, the value attributed to the child forms an explanatory link at the individual level between development and declining fertility.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "perceived old-age-security value of children", "direction": "forward", "reason": "Cross-national Value of Children evidence linking declining OAS value of children to lower fertility, forward.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old-Age%20Security%20Value%20of%20Children"}, {"id": "W1982325724", "group": "pooling", "title": "Old-age security, religious celibacy, and aggregate fertility in a Tibetan population", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "aggregate fertility", "mechanism": "old-age security motive (celibacy/support)", "direction": "forward", "reason": "directly analyzes old-age security and aggregate fertility in a Tibetan population", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old-age%20security%2C%20religious%20celibacy%2C%20and%20aggregate%20fertility%20in%20a%20Tibetan%20population"}, {"id": "W3013628590", "group": "pooling", "title": "Pensions and Fertility: Microeconomic Evidence", "year": null, "venue": null, "authors": null, "abstract": "This study identifies the causal effect of pension generosity on women’s fertility behavior. It capitalizes on Brazil’s expansion of the pension system to rural workers, whose pension wealth subsequently more than tripled. Difference-in-difference, instrumental variable, and event study methods show that the pension reform reduces the propensity of childbearing of women of fertile age by 8 percent in the short run. Completed fertility declines by 1.3 children within 20 years after the reform, reducing the contribution base of the pay-as-you-go long run. The fertility response is strongest at higher birth parities, among older women, and among mothers with sons. (JEL H55, I38, J13, J16, O15)", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "childbearing propensity / completed fertility", "mechanism": "pension wealth (old-age security) crowd-out", "direction": "forward", "reason": "Causal DiD/IV/event-study of Brazilian rural pension expansion on women's fertility; forward empirical effect on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Pensions%20and%20Fertility%3A%20Microeconomic%20Evidence"}, {"id": "W4383684838", "group": "pooling", "title": "Rearing cost, endowment insurance and fertility desire", "year": null, "venue": null, "authors": null, "abstract": "Purpose This research studies the influence and mechanism of rearing cost and endowment insurance on family fertility desire from the micro perspective. Design/methodology/approach Through the construction of overlapping generations (OLG) model and on the basis of this research purpose, the research hypothesis proposed by the theoretical model is tested by using the data of China household tracking survey (CFPS). Findings (1) Endowment insurance has an inhibitory effect on family fertility desire. The marginal effects of participating in old-age insurance on total fertility desire and boy fertility desire are – 3.2% and – 3.6% respectively. (2) The cost of rearing has a significant negative impact on family fertility desire. (3) There is regional heterogeneity in the impact of endowment insurance and rearing cost on fertility desire. (4) There is no significant difference in the impact of endowment insurance on fertility desire between urban and rural areas. Originality/value This research tries to fill the gap existing in the international literature by analyzing the micro mechanism of the influence degree of upbringing cost on fertility desire by introducing the rearing cost and fertility rate into the OLG, providing a micro basis for relevant quantitative calculation.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "family fertility desire", "mechanism": "old-age (endowment) insurance substitutes for children as old-age support", "direction": "forward", "reason": "Estimates negative effect of old-age endowment insurance on fertility desire using CFPS (OLG-motivated), forward OAS-crowdout cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Rearing%20cost%2C%20endowment%20insurance%20and%20fertility%20desire"}, {"id": "W2035788155", "group": "pooling", "title": "Social security and fertility: An international perspective", "year": null, "venue": null, "authors": null, "abstract": "A number of population scholars have asserted that social security programs such as old-age programs lead to decreased fertility levels because parents need not rely on children for \"security\" in old age. There is, however, a paucity of empirical data on the above. This paper analyzes 67 countries and shows that social security programs have a measurable negative effect on subsequent levels of fertility. In fact, the social security programs appear to have as much of an independent impact on fertility as do the traditional correlates of fertility (infant mortality, education and per capita income).", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility levels", "mechanism": "old-age social security programs", "direction": "forward", "reason": "Cross-country empirical estimate of negative effect of social-security programs on fertility - forward poolable cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Social%20security%20and%20fertility%3A%20An%20international%20perspective"}, {"id": "W2356937407", "group": "pooling", "title": "Social Security Expectation,Birth Rate and Population Quality", "year": null, "venue": null, "authors": null, "abstract": "Under the background of traditional culture in China,the relaxation of birth control policy and further improvement of the social security system would inevitably lead individuals to enhance their fertility desire. This article takes the social security expectation into Diamond model to examine the behavior of optimization selection for individuals. Theoretical results show that family will choose number of children and quality under the income and policy constraints. Social security will make personal more secure future,which affects the family current fertility decisions and education investment level of children. On the one hand,social security expectation has inhibitory effect on fertility,but due to the policy factor constraint,this inhibitory effect is small. On the other hand,social security expectation contributes to increase family education investment for children and then improves population quality. Finally,we use the provincial panel data from 1998 to 2011 to test the theoretical model,and empirical results confirm the theoretical part of the conclusion.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "birth rate / fertility", "mechanism": "social security expectation crowding out old-age-support motive", "direction": "forward", "reason": "Diamond model plus provincial panel test finding social security expectation inhibits fertility; forward empirical estimate on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Social%20Security%20Expectation%2CBirth%20Rate%20and%20Population%20Quality"}, {"id": "W4389499634", "group": "pooling", "title": "The Economic Old Age Security Value of Children in the Philippines and Taiwan in the Middle 1970'S.", "year": null, "venue": null, "authors": null, "abstract": "The old age security value of children has been considered an important element of family modernization. It has been related to issues of old age welfare, the persistence of high fertility, and son preference. Yet empirical evidence on such ideas has been lacking. This study uses data on parents' expected reliance on children for financial support in old age (\"support expectations\") to explore the old age economic security value of children in the Philippines and Taiwan: its relation to individual modernity, family size preferences, and in Taiwan to son preference. The study uses nationally-representative cross-societally comparable data for wives of childbearing age from the Value of Children surveys conducted in 1975 and 1976. In both countries, the study finds support expectations to be lower among more modern individuals, as indicated by several socioeconomic characteristics and attitudes. The study delineates particular characteristics and orientations which independently predict an individual's support expectations. The study finds support expectations to have a significant effect on fertility preferences, a fifth of a child, after controlling for parity, knowledge and attitude about contraception, family orientations and socioeconomic characteristics. Upon examination, the support expectations-fertility preferences relationship is found to be specific to preferences for a fourth child in Taiwan, a fourth or higher-order child in the Philippines. Expected support from sons is found related to son preference in Taiwan after controlling for other things, and in a manner consistent with the gradual modernization of both family orientations. Similar findings for the Philippines and Taiwan are consistent with a general movement toward the small, conjugal family typical", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility preferences (desired family size)", "mechanism": "old-age economic security value of children / support expectations", "direction": "forward", "reason": "Value-of-Children surveys show old-age support expectations significantly raise fertility preferences in Philippines/Taiwan; forward empirical OAS-motive effect on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Economic%20Old%20Age%20Security%20Value%20of%20Children%20in%20the%20Philippines%20and%20Taiwan%20in%20the%20Middle%201970%27S."}, {"id": "W2084107624", "group": "pooling", "title": "The effects of child-related benefits and pensions on fertility by birth order: A test on Hungarian data", "year": null, "venue": null, "authors": null, "abstract": "Using aggregate time-series data from post-war Hungary, we investigated the effect of child-related benefits and pensions on overall fertility and fertility by birth order. The results indicate moderate effects that are robust across a wide range of specifications. According to our estimates, a 1-per-cent increase in child-related benefits would increase total fertility by 0.2 per cent, while the same increase in pensions would decrease fertility by 0.2 per cent. The magnitude of both effects increases by birth order; this is more robust for child-related benefits.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility by birth order", "mechanism": "pensions (old-age security) vs child benefits", "direction": "forward", "reason": "Hungarian time-series estimates that higher pensions decrease fertility - forward empirical poolable cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20effects%20of%20child-related%20benefits%20and%20pensions%20on%20fertility%20by%20birth%20order%3A%20A%20test%20on%20Hungarian%20data"}, {"id": "W1555888750", "group": "pooling", "title": "The effects of education, health, and social security on fertility in developing countries", "year": null, "venue": null, "authors": null, "abstract": "This paper analyzes the effects of education, health and social security on fertility in developing countries. Spending on education does not necessarily reduce fertility. For example, with small amounts of education fertility tends to increase before falling off at the level of completed primary school; its specific effect can only be measured by working at a particular population group. Health care services which reduce child mortality also reduce fertility when life expectancy reaches a level which anticipates the need for fewer children. Generally, this is a more costly way to reduce fertility than family planning. Lastly, even though the general effect of social security systems on fertility is more difficult to study and quantify, a preliminary estimate shows it to be the most costly method, compared with education, health care and family planning.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "social security reduces old-age reliance on children", "direction": "forward", "reason": "Analyzes and estimates effects of education, health and social security on fertility in developing countries; forward social-security effect on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20effects%20of%20education%2C%20health%2C%20and%20social%20security%20on%20fertility%20in%20developing%20countries"}, {"id": "W3035169938", "group": "pooling", "title": "The fertility effects of public pension: Evidence from the new rural pension scheme in China", "year": null, "venue": null, "authors": null, "abstract": "Public pension insurance has become a major form of social protection around the world. However, little is known about the association between public pension expansion and individuals' fertility in developing economies. In this paper, we examine the effects of the New Rural Pension Scheme (NRPS) on the fertility of married women in rural China. Using data from the China Family Panel Studies (CFPS), the difference-in-differences approach is employed to estimate the impact of NRPS expansion on fertility outcomes. The robustness of results is checked through additional estimations, including difference-in-differences with propensity score matching, fixed-effects model, and instrumental variable approach. Results show that the NRPS expansion has a significantly negative effect on the number of children, and it reduces the likelihood of having a second child. The fertility-reducing effect of the NRPS is larger for the younger, well-educated women and those in high-income families. Considerations of the fertility effects and their population differences are needed in the impact evaluations of relevant public pension reform.", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "number of children / second-birth probability", "mechanism": "New Rural Pension Scheme expansion", "direction": "forward", "reason": "Difference-in-differences estimate of China's New Rural Pension Scheme on married women's fertility; forward pension -> fertility, primary cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20fertility%20effects%20of%20public%20pension%3A%20Evidence%20from%20the%20new%20rural%20pension%20scheme%20in%20China"}, {"id": "W4361800754", "group": "pooling", "title": "The Impact of Social Security on Fertility Willingness in OECD Countries", "year": null, "venue": null, "authors": null, "abstract": "The low fertility rate is a common problem faced by all countries in the world today. All countries in the world have adopted different policies to improve the fertility rate. Based on the panel data of 36 OECD member countries from 1995 to 2019, this paper studies the impact of social security level on fertility through a two-way fixed effect model, and also examines the impact of other influencing factors on fertility. The results show that there is a U-shaped relationship between social security expenditure and fertility rate, and
