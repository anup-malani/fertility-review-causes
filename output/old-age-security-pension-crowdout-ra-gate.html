alse, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "second-child fertility intention", "mechanism": "intergenerational family support / grandparental childcare", "direction": "forward", "reason": "Fertility intention driven by family intergenerational support, not old-age-security transfers.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20Support%20and%20Second-Child%20Fertility%20Intention%20in%20the%20Chinese%20Sandwich%20Generation%3A%20The%20Parallel%20Mediation%20Model%20of%20Double%20Burnout"}, {"id": "W2037030453", "group": "uncertain", "title": "Intergenerational transfers and fertility: Trade-off between human capital and child labour", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "THEORY", "outcome": "fertility", "mechanism": "intergenerational transfers, quantity-quality/child-labour trade-off", "direction": "forward", "reason": "Title links intergenerational transfers to fertility; no abstract, plausibly an OAS-relevant model but cannot confirm.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20transfers%20and%20fertility%3A%20Trade-off%20between%20human%20capital%20and%20child%20labour"}, {"id": "W3123377463", "group": "uncertain", "title": "Intergenerational Transfers and the Fertility-Income Relationship", "year": null, "venue": null, "authors": null, "abstract": "Evidence from cross-sectional data reveals a negative relationship between family income and fertility. This article argues that constraints to intergenerational transfers are crucial for understanding this relationship. If parents could legally impose debt obligations on their children to recover the costs incurred in raising them, then fertility would be independent of parental income. A relationship between fertility and income arises when parents are unable to leave debts because of legal, enforcement or moral constraints. This relationship is negative when the intergenerational elasticity of substitution is larger than one, a case in which parental consumption is a good substitute for children’s consumption.", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "THEORY", "outcome": "fertility-income relationship", "mechanism": "constraints on intergenerational (parent-to-child) transfers", "direction": "forward", "reason": "Theory of fertility via intergenerational-transfer constraints (children as investment); adjacent to but not squarely the OAS/pension motive.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20Transfers%20and%20the%20Fertility-Income%20Relationship"}, {"id": "W2341021758", "group": "uncertain", "title": "Intergenerational transfers and the fertility-income relationship: intergenerational transfers and fertility", "year": null, "venue": null, "authors": null, "abstract": "Extensive evidence from cross-sectional data reveals a robust negative relationship between family income and fertility. This paper argues that constraints to intergenerational transfers are crucial for understanding this relationship. If parents could legally impose debt obligations on their children as a way to recover the costs incurred in raising them, then fertility would be independent of parental income. In this case, if the present value of a child’s future income exceeds the cost of raising the child, as the evidence suggests is the case, parents would have incentives to raise as many children as possible in order to maximize rents. A relationship between fertility and income arises when parents are unable to leave debts behind either because of legal, enforcement, or moral constraints. We also derive the conditions under which the fertility-income relationship is negative. Notably, an intergenerational elasticity of substitution larger than one is required. In this case, parental consumption is a good substitute for children’s consumption making it optimal for income rich parents to have fewer children.", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "THEORY", "outcome": "fertility-income relationship", "mechanism": "constraints on intergenerational (parent-to-child) transfers", "direction": "forward", "reason": "Theory of fertility-income relationship via intergenerational-transfer constraints (children as investment); adjacent to but not squarely the OAS/pension motive.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20transfers%20and%20the%20fertility-income%20relationship%3A%20intergenerational%20transfers%20and%20fertility"}, {"id": "W1602829365", "group": "uncertain", "title": "Intergenerational Transfers Motivated by Altruism from Children towards Parents : Dynamic Macro-economic Theory (Mathematical Economics)", "year": null, "venue": null, "authors": null, "abstract": "This study has two ends.The first is to construct aformal model with altruism from children towards parents and to reveal the struc- ture of an equilibrium, which has not been studied in the existing literature.The second is to establish the existence of an equilibrium in this model by demonstrating the existence of adynamically consistent allocation in the concept of subgame perfect Nash equilibrium.", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "OFF", "outcome": "equilibrium existence of child-to-parent transfers", "mechanism": "altruistic old-age transfers from children to parents", "direction": "n/a", "reason": "Formal model of old-age support transfers from children to parents (OAS mechanism) but does not model or estimate fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20Transfers%20Motivated%20by%20Altruism%20from%20Children%20towards%20Parents%20%3A%20Dynamic%20Macro-economic%20Theory%20%28Mathematical%20Economics%29"}, {"id": "W2155077804", "group": "uncertain", "title": "Introduction to Special Section for Journal of Cross-Cultural Psychology: Value of Children: A Concept for Better Understanding Cross-Cultural Variations in Fertility Behavior and Intergenerational Relationships", "year": null, "venue": null, "authors": null, "abstract": "The concept of value of children (VOC) was introduced three decades ago and has recently gained increasing importance due to ongoing significant demographic changes in many parts of the world, namely declining birth rates and increasing life expectancy. Even though the concept of VOC suggests interdisciplinary and cross-cultural research, these methodologies were only recently used as part of a collaborative international enterprise aiming to revise and extend the original VOC study. The extended study is based on psychological and sociological approaches and makes use of more sophisticated methods of cross-cultural comparison and multilevel analyses. The thematic scope has also been expanded beyond childbearing to childrearing and also deals with parent-child relations over the entire lifespan. The present special section provides an overview of ongoing theoretical and methodological progress on the basis of four selected studies on VOC and intergenerational relations in different cultures.", "is_gold": false, "tier": 3, "evidence_type": "review", "cell": "THEORY", "outcome": "fertility behavior / intergenerational relations", "mechanism": "value-of-children (incl. old-age-support value)", "direction": "forward", "reason": "Value-of-children concept encompasses old-age-support motive for fertility but is conceptual/review with no empirical estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Introduction%20to%20Special%20Section%20for%20Journal%20of%20Cross-Cultural%20Psychology%3A%20Value%20of%20Children%3A%20A%20Concept%20for%20Better%20Understanding%20Cross-Cultural%20Variations%20in%20Fertility%20Behavior%20and%20Intergenerational%20Relationships"}, {"id": "W3208810542", "group": "uncertain", "title": "JSIT19-05: The Impact of Social Security Eligibility on Transfers to Elderly Parents and Wealth-Building among Adult Children", "year": null, "venue": null, "authors": null, "abstract": "This study explores the impact of social security eligibility on transfers between adult children and elderly parents and the resulting impact on wealth-building among adult children.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "intergenerational transfers and wealth", "mechanism": "social-security eligibility crowd-out of family transfers", "direction": "forward", "reason": "SS eligibility -> child-parent transfers; crowd-out mechanism but outcome is transfers, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=JSIT19-05%3A%20The%20Impact%20of%20Social%20Security%20Eligibility%20on%20Transfers%20to%20Elderly%20Parents%20and%20Wealth-Building%20among%20Adult%20Children"}, {"id": "W1881805643", "group": "uncertain", "title": "Labor Supply And Retirement Policy In An Overlapping Generations Model With Stochastic Fertility", "year": null, "venue": null, "authors": null, "abstract": "Using a stochastic general equilibrium model with overlapping generations, this paper studies a policy rule for the retirement age aiming at offsetting the effects on the supply of labor following fertility changes. The authors find that the retirement age should increase more than proportionally to the direct fall in labor supply caused by a fall in fertility. The robustness of this result is checked against alternative model specifications and parameter values. The efficacy of the policy rule depends crucially on the link between the preference for leisure and the response of the intensive margin of labor supply to changes in the statutory retirement age. The model has subsequently been calibrated for Brazil by Jorgensen (2010), in the context of the Brazil Aging Study.", "is_gold": false, "tier": 3, "evidence_type": "structural", "cell": "OFF", "outcome": "labor supply / retirement age policy", "mechanism": "retirement-age policy rule offsetting fertility-driven labor-supply changes", "direction": "reverse", "reason": "OLG pension model links fertility and retirement policy, but fertility is exogenous and the outcome is labor supply/retirement age, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Labor%20Supply%20And%20Retirement%20Policy%20In%20An%20Overlapping%20Generations%20Model%20With%20Stochastic%20Fertility"}, {"id": "W1643465958", "group": "uncertain", "title": "Life-Cycle and Intergenerational Effects of Child Care Reforms", "year": null, "venue": null, "authors": null, "abstract": "We investigate the importance of various mechanisms by which child care policies can affect life-cycle patterns of employment and fertility among women, as well as long-run cognitive outcomes among children. A structural life-cycle model of employment, fertility, and child care use is estimated using Norwegian administrative data. The estimation exploits a large-scale child care reform, which provided generous cash transfers to mothers who did not use formal child care facilities. Combining with administrative data on national test scores, we examine the effects of mother's behavior on long-run cognitive outcomes of children, via estimating a cognitive ability production function that corrects for the endogeneity of inputs. We find that the child care reform generates sizable changes in employment and fertility decisions, especially among low-education women. This leads to lower reading scores among children, primarily as a result of mothers shifting away from formal care and becoming employed. Simulation results suggest that a partial reform, in which workers are ineligible for cash transfers, can generate a more balanced impact on the population. The implications of tax policy and maternity leave are also investigated.", "is_gold": false, "tier": 3, "evidence_type": "structural", "cell": "OFF", "outcome": "employment, fertility, child cognitive outcomes", "mechanism": "childcare subsidy / cash-for-care reform", "direction": "forward", "reason": "Structural model estimates fertility effect but driver is childcare policy, not old-age security.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Life-Cycle%20and%20Intergenerational%20Effects%20of%20Child%20Care%20Reforms"}, {"id": "W4299143631", "group": "uncertain", "title": "Modernising social security for lone parents: avoiding fertility and unemployment traps when reforming social policy in Northern Europe", "year": null, "venue": null, "authors": null, "abstract": "Introduction European family structures and labour markets have changed markedly over the last 40 years but social security reforms have lagged behind in responding to these changes in many countries. The share of lone-parent households in Organisation for Economic Co-operation and Development (OECD) countries rose from 5.5% in the mid-1980s to 8.1% in the mid-2000s (OECD, 2011, p 215). The extent of lone-parent households is even greater in Northern Europe. In the Netherlands, for example, one in four households with children are a lone-parent household. This amounts to half a million lone-parent households in 2011, up from 361,000 in 1995 (CBS, 2013). There is a general rise in the numbers of lone parents working, but the extent varies across Europe (OECD, 2011, p 215). In some countries, the number of lone parents working is minimal and only prevalent in the more privileged socio-economic groups, whereas in other countries, the number is much larger and more even across socio-economic groups. Mainly in Nordic countries, lone parents work to the same extent as other single persons, other parents or both. In the context of ageing populations and pressures on public budgets, all countries want to raise employment, and thus also among lone parents. For this purpose, governments look to ways of modernising social security that are both employment- and family-friendly. For governments, learning from other countries is an obvious strategy in view of the large cross-national differences in the scope and distribution of lone-parent employment. Indeed, many cross-national differences in lone-parent employment may, in part, be explained by policy differences. For example, child family allowances intend to compensate for the costs of raising children, and even act as an incentiv", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "lone-parent employment / fertility trap", "mechanism": "lone-parent social security benefits", "direction": "forward", "reason": "Discusses fertility traps in social-security reform for lone parents; welfare-benefit channel, not the OAS motive.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Modernising%20social%20security%20for%20lone%20parents%3A%20avoiding%20fertility%20and%20unemployment%20traps%20when%20reforming%20social%20policy%20in%20Northern%20Europe"}, {"id": "W2495747527", "group": "uncertain", "title": "Modernising social security for lone parents: avoiding fertility and unemployment traps when reforming social policy in Northern Europe", "year": null, "venue": null, "authors": null, "abstract": "Abstract From outside the toxified ‘work incentives’ debate in the UK, Anders Freundt, Simon Grundt Straubinger and Jon Kvist tackle the question of fertility and employment traps within contemporary social security systems. Their analysis explores cross-national differences between seven Northern European countries in the relationship between social security arrangements and opportunities for employment and family-building. Using economic indicators, the chapter focuses on the comparisons between the situations of lone parents and single people in order to examine the interface between economics and choices to work and have children. Lone parents are the focus because they are the fastest-rising family form and continue to represent the greatest challenge to the largely obsolete breadwinner model in many welfare states. The chapter shows a clear division between the social-democratic Nordic states and the others – Germany, the Netherlands and the UK. While this patterning may come as no surprise, the findings support the case for universalism rather than means-testing as the key to removing obstacles to employment and avoiding divisions between employed and unemployed people in family welfare.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "fertility/employment 'traps'", "mechanism": "lone-parent social security/welfare arrangements", "direction": "forward", "reason": "Social-security-fertility interface but the policy is lone-parent welfare, not OAS/pension crowdout.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Modernising%20social%20security%20for%20lone%20parents%3A%20avoiding%20fertility%20and%20unemployment%20traps%20when%20reforming%20social%20policy%20in%20Northern%20Europe"}, {"id": "W4302309890", "group": "uncertain", "title": "Modernising social security for lone parents: avoiding fertility and unemployment traps when reforming social policy in Northern Europe", "year": null, "venue": null, "authors": null, "abstract": "From outside the toxified ‘work incentives’ debate in the UK, Anders Freundt, Simon Grundt Straubinger and Jon Kvist tackle the question of fertility and employment traps within contemporary social security systems. Their analysis explores cross-national differences between seven Northern European countries in the relationship between social security arrangements and opportunities for employment and family-building. Using economic indicators, the chapter focuses on the comparisons between the situations of lone parents and single people in order to examine the interface between economics and choices to work and have children. Lone parents are the focus because they are the fastest-rising family form and continue to represent the greatest challenge to the largely obsolete breadwinner model in many welfare states. The chapter shows a clear division between the social-democratic Nordic states and the others – Germany, the Netherlands and the UK. While this patterning may come as no surprise, the findings support the case for universalism rather than means-testing as the key to removing obstacles to employment and avoiding divisions between employed and unemployed people in family welfare.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "fertility & employment traps (lone parents)", "mechanism": "social-security means-testing / work incentives", "direction": "forward", "reason": "cross-national social-security fertility/employment traps, not OAS crowd-out", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Modernising%20social%20security%20for%20lone%20parents%3A%20avoiding%20fertility%20and%20unemployment%20traps%20when%20reforming%20social%20policy%20in%20Northern%20Europe"}, {"id": "W4408898135", "group": "uncertain", "title": "More children, more blessings? The effect of children on depression symptom in old age", "year": null, "venue": null, "authors": null, "abstract": "China has entered a stage of deep population aging, and it has brought great challenges to the country and society. With the aggravation of aging, the physical and mental health problems of the old adults and the subsequent elderly-care problems have been concerned by all sectors of society. With the development of economy and society and the change of fertility concept, especially in recent years, after the change of the fertility policy, whether the number of children has a protective effect on the mental health of the old adults has been widely concerned by the society. This study using the Chinese health and retirement longitudinal study (CHARLS) data, established instrument variable regression models with an instrument variable chosen according with the Chinese fertility preference, and then deeply analyzed the causal effect of the number of children on the depressive symptoms of the old adults.The results of the study showed that, (1) Chinese people had a common fertility preference for boys; (2) and the fertility preference for boys was quite steady among generations. (3) The Naïve Probit regression indicated that, the number of children could significantly increase depressive symptoms in old age, however, the regression of instrumental variable showed that the number of children had no significant effect on the depressive symptoms in old age.Using CHARLS 2018 data, and also using an instrument variable regression, this study made a series of classification analysis according to the respondents’ factors like age, gender, marital status, places of residence (urban or rural areas), and education levels, and moreover, we used the data of CHARLS 2011 made the stability test, and all the results were consistent. This study illustrated that to improve depressive sympto", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "old-age depressive symptoms", "mechanism": "number of children as old-age (mental-health) support", "direction": "reverse", "reason": "IV study of number of children on elderly depression, value-of-children not fertility outcome", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=More%20children%2C%20more%20blessings%3F%20The%20effect%20of%20children%20on%20depression%20symptom%20in%20old%20age"}, {"id": "W1531108406", "group": "uncertain", "title": "Old Age Security and the Roles of Children, Education, Savings and Pensions: Some Findings from Rural Cost-Rica", "year": null, "venue": null, "authors": null, "abstract": "PENSION BENEFITS;SAVINGS;CHILDREN", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "old-age support sources (children/savings/pensions)", "mechanism": "children as old-age security vs savings/pensions", "direction": "n/a", "reason": "Title suggests children-vs-pensions old-age-security roles but abstract is only keywords; cannot confirm forward fertility estimate, route to gate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old%20Age%20Security%20and%20the%20Roles%20of%20Children%2C%20Education%2C%20Savings%20and%20Pensions%3A%20Some%20Findings%20from%20Rural%20Cost-Rica"}, {"id": "W2752229416", "group": "uncertain", "title": "Old age support and intergenerational relations in urban China: Maintenance of obligations between older parents and children.", "year": null, "venue": null, "authors": null, "abstract": "This dissertation is an empirical study of the pattern of old age support of service and economic types in contemporary urban China. The aim of the study is to describe the current pattern of intra-familial support, and, by examining the processes of intergenerational transfer of resources, to explain the mechanisms through which intergenerational relations are maintained and old age support actualized. A more general issue this study seeks to address is how, given the apparent decline of parental power and authority in urban China, the institution of intra-familial support has been maintained. The primary data used in this study are from the Survey on Aging and Intergenerational Relations in the Baoding city, Hebei province, China, carried out in the summer of 1994. Baoding is a mid-sized industrial city in the northern China. The survey was based on a multi-stage equal probability sampling design. The final sample consists of 1002 parent respondents (age 50 and older), and 753 adult children (age 18 or older) of these parents. The statistical tools used in the study include logistic regression and regression of limited dependent variables. The main findings are as follows. (1) Although there is still a lack of comprehensive social welfare system, the general well-being of the urban elderly, as compared with other age groups, does not seem to be particularly disadvantageous. (2) Parents' investment in and continued association with children increase, both in likelihood and in quantity, the support they receive from their grown children. (3) Given grown children's continued identification with their parental families, the act of old age support is prompted by the perceived needs of older parents, and constrained by children's own economic capacity. Hence, the transfer o", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "intra-familial old-age support to parents", "mechanism": "intergenerational support obligations", "direction": "reverse", "reason": "Studies whether/how adult children provide old-age support (OAS premise) but measures support flows, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Old%20age%20support%20and%20intergenerational%20relations%20in%20urban%20China%3A%20Maintenance%20of%20obligations%20between%20older%20parents%20and%20children."}, {"id": "W2358195170", "group": "uncertain", "title": "On Social Pension Insurance System for Lost Only Child Family", "year": null, "venue": null, "authors": null, "abstract": "China's population structure change is speeding up and the ageing trend is accelerating. The number of lost only child family grows quickly also. Compared with other old people,people in lost only child family could not benefit from the traditional family endowment function and has to face more severe pension problems. This paper has made some research on the difficulties of those families,and proposed to improve the social pension insurance system and social care service system in policy design for those people.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "pension provision for lost-only-child families", "mechanism": "social pension insurance substituting for lost family support", "direction": "n/a", "reason": "Policy discussion of pensions for families who lost their only child; related vocabulary but not a pension-to-fertility estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=On%20Social%20Pension%20Insurance%20System%20for%20Lost%20Only%20Child%20Family"}, {"id": "W2063094059", "group": "uncertain", "title": "Parental Repayment Hypothesis in Intergenerational Financial Transfers from Adult Children to Elderly Parents: Evidence from Hong Kong", "year": null, "venue": null, "authors": null, "abstract": "This study examined financial transfers from adult children to non-co-resided elderly parents in Hong Kong, and it tested the parental repayment hypothesis regarding motives for transfers. Specifically, the research question is whether financial transfers are a function of the education or earning capacity of adult children. Based on data from a representative sample of adult children who provided financial support to their elderly parents aged 60 and above, we used multiple regression models to identify the correlates of the amount of transfers from children to their mother or father living apart. We found evidence supporting the parental repayment hypothesis, that providing security in old age is the children's repayment for parental investment in their education. There is only a weak relation between the number of children and the transfers. This calls into question common assumptions about the extent to which a decline in fertility poses a threat to the extent of familial support of older persons in the coming decades.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "financial transfers from adult children to parents", "mechanism": "parental repayment / old-age support motive", "direction": "reverse", "reason": "Tests old-age-support/repayment motive and comments on fertility-support link, but outcome is transfers, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Parental%20Repayment%20Hypothesis%20in%20Intergenerational%20Financial%20Transfers%20from%20Adult%20Children%20to%20Elderly%20Parents%3A%20Evidence%20from%20Hong%20Kong"}, {"id": "W2895977434", "group": "uncertain", "title": "Parental Transfers, Intra-household Bargaining and Fertility Decision", "year": null, "venue": null, "authors": null, "abstract": "Abstract This paper examines the role of parental transfers on family size. We introduce a simple theoretical model of fertility decision where preferences towards children may differ between female and male spouses. Parental transfers increase both the household income and the bargaining power of the recipient spouse. Therefore, transfers from wife’s and husband’s parents may have dissimilar effects on the number of children. Our empirical result, based on a unique household-level data for Japan, supports this hypothesis. In particular, received transfers from the wife’s parents are negatively associated with the demand for children. In contrast, both received and expected transfers from the husband’s parents are positively associated with the demand for children. These results hold important policy implications.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "number of children / demand for children", "mechanism": "inter-vivos parental transfers, intra-household bargaining", "direction": "forward", "reason": "Parental transfers affect fertility demand, but the channel is income/bargaining, not the OAS/pension mechanism.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Parental%20Transfers%2C%20Intra-household%20Bargaining%20and%20Fertility%20Decision"}, {"id": "W3123778891", "group": "uncertain", "title": "Pension Coverage for Parents and Educational Investment in Children: Evidence from Urban China", "year": null, "venue": null, "authors": null, "abstract": "When social security is established to provide pensions to parents, their reliance upon children for future financial support decreases, and their need to save for retirement also falls. In this study, the expansion of pension coverage from the state sector to the non-state sector in urban China is used as a quasi-experiment to analyze the intergenerational impact of social security on education investments in children. In a difference-indifferences framework, a significant increase in the total education expenditure is found to be attributable to pension expansion. The results are unlikely to be driven by other observable trends. They are robust to the inclusion of a large set of control variables and to different specifications, including one based on the instrumental variable method.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "educational investment in children", "mechanism": "pension coverage reduces reliance on children for old-age support, shifting toward child quality", "direction": "forward", "reason": "DiD of pension expansion on child education investment; OAS mechanism but outcome is schooling not fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Pension%20Coverage%20for%20Parents%20and%20Educational%20Investment%20in%20Children%3A%20Evidence%20from%20Urban%20China"}, {"id": "W2504575467", "group": "uncertain", "title": "Pensions and Children", "year": null, "venue": null, "authors": null, "abstract": "The crisis of the pensions system in Europe is primarily a demographic crisis, resulting from falling fertility and increasing longevity. Fertility rates fell from 2.1 children per female in the 1970s to 1.7 children per female in the 1990s, and they are not expected to pick up again in the future. The problem is compounded by increasing longevity. The ratio of people above 65 to people between 15 and 65 (one way to measure the so-called dependency ratio) in most European countries is expected to more than double, on average, in the EU countries between now and 2050. In percentage terms, such a ratio is expected to rise by at least 60 per cent in the case of the UK, up to 125 per cent in the case of Italy. In 2050 the dependency ratio is projected to be around 70 per cent in Italy and Spain; between 45 and 50 per cent in Germany and France; and just below 40 per cent in the UK. Changes in the dependency ratio are expected to be even more dramatic for the newly acceded countries — currently featuring relatively young populations, but expected to follow the same demographic pattern as the rest of Europe at a very fast pace.", "is_gold": false, "tier": 3, "evidence_type": "review", "cell": "OFF", "outcome": "pension-system/dependency-ratio crisis", "mechanism": "falling fertility and longevity drive pension crisis", "direction": "reverse", "reason": "frames pension crisis as consequence of fertility decline, not pension effect on fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Pensions%20and%20Children"}, {"id": "W2386572963", "group": "uncertain", "title": "Probing into the Development of the Social Insurance System of Modern Fertility", "year": null, "venue": null, "authors": null, "abstract": "s: By expressing the evolution process of the social insurance system of modern fertility, the paper probed into the development of the system.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "maternity/fertility insurance system development", "mechanism": "n/a", "direction": "n/a", "reason": "Vague abstract on a 'social insurance system of fertility'; likely maternity insurance, not OAS crowd-out, but cannot decide.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Probing%20into%20the%20Development%20of%20the%20Social%20Insurance%20System%20of%20Modern%20Fertility"}, {"id": "W2036937846", "group": "uncertain", "title": "Public Debt, Child Allowances and Pension Benefits with Endogenous Fertility", "year": null, "venue": null, "authors": null, "abstract": "Abstract The public debt stock in some economically developed countries continues to increase because of a lack of tax revenues and the concomitant burdens of social security. Many of those countries suffer from lower birth rates and consequently, have fewer children. Child allowances might be an effective way to increase fertility, leading to higher future tax revenues through an increase in the number of younger people. In this paper, the authors examine whether or not child allowances reduce the public debt stock as a share of GDP in an economy with a pension system. As long as a non-negative debt policy is adopted in the long run, child allowances financed by bonds always increase the public debt stock as a share of GDP.", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "OFF", "outcome": "public debt / GDP", "mechanism": "child allowances and pension system, endogenous fertility", "direction": "forward", "reason": "Theory of child allowances and pensions with endogenous fertility but outcome of interest is public debt, not a forward OAS-to-fertility effect.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Public%20Debt%2C%20Child%20Allowances%20and%20Pension%20Benefits%20with%20Endogenous%20Fertility"}, {"id": "W3126136216", "group": "uncertain", "title": "Public debt, child allowances, and pension benefits with endogenous fertility", "year": null, "venue": null, "authors": null, "abstract": "The stock of public debt in some developed countries continues to increase because of a lack of tax revenues and the burdens of social security. Many of those developed countries suffer from lower birth rates. Child allowances might help to raise fertility, leading to higher tax revenue in the future because of an increase in the younger population. In this paper, the authors examine whether or not child allowances reduce the public debt stock as a share of Gross Domestic Product (GDP) in an economy with a pension system. As long as the long-run debt ratio is non-negative, child allowances financed by bonds always increase the public debt stock per unit of GDP.", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "OFF", "outcome": "public debt / GDP", "mechanism": "child allowances and pension system, endogenous fertility", "direction": "forward", "reason": "Duplicate of the child-allowances/public-debt theory paper; outcome is debt/GDP, not a forward OAS-to-fertility effect.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Public%20debt%2C%20child%20allowances%2C%20and%20pension%20benefits%20with%20endogenous%20fertility"}, {"id": "W4361795481", "group": "uncertain", "title": "Public Pensions and Income Transfer Between the Elderly and Their Children", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "income transfers between elderly and their children", "mechanism": "public pensions crowding out intergenerational transfers", "direction": "forward", "reason": "Title indicates pensions and elderly-child income transfers (crowd-out adjacent); no abstract and outcome is transfers not fertility, route to RA gate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Public%20Pensions%20and%20Income%20Transfer%20Between%20the%20Elderly%20and%20Their%20Children"}, {"id": "W2776631321", "group": "uncertain", "title": "Raising Children to Work Hard: Altruism, Work Norms, and Social Insurance*", "year": null, "venue": null, "authors": null, "abstract": "Children who can count on support from altruistic parents may not try hard to succeed in the labor market. Moreover, parental altruism makes withdrawal of such support non-credible. To promote work effort, parents may want to instill norms which later cause their children to experience guilt or shame associated with failure to support themselves. While social insurance pools risk across families, we show that it also creates a free-rider problem among parents in terms of norm formation. We also examine the formation of norms requiring children to support their parents financially in old age.", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "OFF", "outcome": "work norms/effort, support-parents norms", "mechanism": "altruism, social insurance, old-age support norms", "direction": "forward", "reason": "Theory of social insurance and norms about children supporting parents in old age, but models work norms, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Raising%20Children%20to%20Work%20Hard%3A%20Altruism%2C%20Work%20Norms%2C%20and%20Social%20Insurance%2A"}, {"id": "W1968782652", "group": "uncertain", "title": "Reassessing the Insurance Effect: A Qualitative Analysis of Fertility Behavior in Senegal and Zimbabwe", "year": null, "venue": null, "authors": null, "abstract": "A number of prominent demographers have recently reiterated the argument that a lasting mortality decline is a key determinant of the fertility transition. Of the main hypothesized pathways linking fertility to mortality, the one least studied is the insurance hypothesis: the notion that, in high‐mortality contexts, people decide to have more children in order to anticipate possible future child deaths and lessen the risks of having too few surviving offspring. In‐depth interviews and focus groups from Zimbabwe and Senegal are used to examine this hypothesis and to extend it into a broader theory of reproductive decision making under uncertainty. Whereas insurance strategies are frequent in Zimbabwe and occur in urban Senegal, in the higher‐mortality settings—the rural Senegalese site and the recent past described by respondents in Zimbabwe and urban Senegal—deliberate fertility‐limitation strategies are rare. The data depict fundamental changes in attitudes, strategies, and behaviors concerning family size over time and, in Senegal, over space. Important reproductive goals and risks extend far beyond numbers of children and mortality. Parents seek to have healthy, successful children for many reasons including companionship, descendants, and old‐age support. Diverse investments in child quality (their education, health, etc.) and quantity (numbers of births) are the main means to attain these goals and, less recognized by demographers, are also important ways for parents to manage uncertainty in family‐building outcomes; the “classic” insurance mechanism is only one, often minor, aspect of the quantity option.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "fertility behavior/desired family size", "mechanism": "child-mortality insurance; old-age support among motives", "direction": "forward", "reason": "Qualitative study of fertility under uncertainty; old-age support noted as a motive but focus is mortality-insurance, not pensions.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Reassessing%20the%20Insurance%20Effect%3A%20A%20Qualitative%20Analysis%20of%20Fertility%20Behavior%20in%20Senegal%20and%20Zimbabwe"}, {"id": "W4392919455", "group": "uncertain", "title": "Research on old-age security of parents of one-child families in China in the new era", "year": null, "venue": null, "authors": null, "abstract": "Since 1979, China has implemented the family planning policy, and one-child families have become a common phenomenon in society. Since entering the new era, the parents of this group have gradually entered the old age, and the issue of pension security has become the focus of social attention. This paper discusses the demand overview, basic status and existing problems of the pension security for parents of one-child families in China in the new era, and puts forward specific implementation suggestions such as strengthening the top-level design, tapping multiple forces and strengthening children's obligations, so as to provide reference for improving the pension security situation for parents of one-child families.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "old-age security needs of one-child-family parents", "mechanism": "low fertility (one-child policy) leaves parents with weaker old-age support", "direction": "reverse", "reason": "discusses old-age security consequences of one-child fertility, not pension effect on fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Research%20on%20old-age%20security%20of%20parents%20of%20one-child%20families%20in%20China%20in%20the%20new%20era"}, {"id": "W4414155628", "group": "uncertain", "title": "Research on the Aging Pressure and Declining Birth Rate in the Pension System", "year": null, "venue": null, "authors": null, "abstract": "With the global aging population and declining fertility rates, pension systems are facing unprecedented pressure. As the proportion of the working-age population shrinks year by year, the shrinking number of contributors and the surging number of pension recipients create a sharp contradiction, leading to current pension revenue and expenditure shortfalls in some countries, even forcing them to rely on fiscal subsidies to barely maintain operations. Among existing pension systems, the pay-as-you-go system, based on the principle of \"intergenerational support,\" is most significantly impacted by demographic changes. The balance between pension rights accumulated during youth and actual benefits received in old age is being disrupted, posing a serious challenge to sustainability. This article analyzes the impact of population aging and low fertility on pension systems, examines the sustainability of the existing pension system, and proposes policy recommendations, including raising the retirement age, optimizing pension investment structures, implementing fertility policies, and promoting the development of a multi-pillar pension system. Raising the retirement age must be accompanied by flexible adjustments to the job market to avoid exacerbating employment difficulties for older individuals. Optimizing the investment structure requires expanding diversified asset allocation while maintaining manageable risks to enhance long-term returns. The study concludes that only comprehensive institutional reforms and policy adjustments can effectively address the pension payment crisis brought about by demographic changes.", "is_gold": false, "tier": 3, "evidence_type": "review", "cell": "OFF", "outcome": "pension-system sustainability", "mechanism": "aging and low fertility strain PAYG intergenerational-support pension systems", "direction": "reverse", "reason": "analyzes fertility decline's pressure on pensions and reform options, not pension effect on fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Research%20on%20the%20Aging%20Pressure%20and%20Declining%20Birth%20Rate%20in%20the%20Pension%20System"}, {"id": "W3108618597", "group": "uncertain", "title": "Security in old age for older single women without children", "year": null, "venue": null, "authors": null, "abstract": "Australia's population is ageing. Women are much more likely than men to live in poverty in old age, especially single women (AHRC, 2010). Improving the economic security of single older women is a policy priority. It is also an important objective for financial advisors. Most research into the reasons behind single older women’s economic insecurity focuses on the ‘motherhood penalty’: the effects of having and rearing children on labour market participation, incomes and retirement incomes. In Australia, however, 16 per cent of women do not have children (Koropeckyj-Cox & Call 2007) and this proportion is growing. Little is known about older single women who do not have children, including how they are faring leading up to and after retirement and to what extent, when children are removed from the equation, gender inequalities persist. This report presents the results of new research, providing a detailed picture of what shapes the financial security and wellbeing of older single women without children (whom for the purposes of this project we will call older SWWC). Funded by CPA Australia, the research asks: How are older SWWC faring in employment, superannuation, housing and aged care? How does this compare with other gender and relationship groups? How can public policies support SWWC to obtain financial security in later life? How can accountants/financial advisors support SWWC to navigate these systems? To answer these questions, the report draws on a review of national legislation, analysis of Australia’s Household, Income and Labour Dynamics in Australia (HILDA) Survey, an online community with 45 older SWWC, and interviews with 10 financial stakeholders (i.e. financial advisors and housing specialists). Findings will inform policy and practice of governments and", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "old-age financial security of childless single women", "mechanism": "childlessness and retirement income", "direction": "reverse", "reason": "Examines how not having children shapes old-age financial security; reverse of primary cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Security%20in%20old%20age%20for%20older%20single%20women%20without%20children"}, {"id": "W2915280617", "group": "uncertain", "title": "Social Pensions and Child Health in Rural China", "year": null, "venue": null, "authors": null, "abstract": "Social pensions are important cash transfers to the elderly and their families. The pensions may not only affect the wellbeing of the direct recipients, but also have household and intergenerational spillover effects. Using the 2012 and 2014 waves of the China Family Panel Studies (CFPS) data, this paper examines the effect of the New Rural Pension Scheme (NRPS) and its mechanisms on child health in rural China. Our study shows a significant association between the NRPS and the health status of children up to 15 years of age. Moreover, the association of the NRPS with health is larger for children who are boys, ‘left behind’, six to 10 years of age, and in poor health. In addition, we investigate possible mechanisms of the effect, including health consciousness of the caregiver, household sanitation conditions, and high-protein food consumption, and find the increase of child nutrition intake is the main channel through which the NRPS affects child health.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "child health", "mechanism": "New Rural Pension Scheme intergenerational spillover", "direction": "forward", "reason": "NRPS effect on child health via nutrition; pension study but outcome is child health, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Social%20Pensions%20and%20Child%20Health%20in%20Rural%20China"}, {"id": "W4302088185", "group": "uncertain", "title": "Social security support for children", "year": null, "venue": null, "authors": null, "abstract": "At the start of the 21st century, the debate in the UK about how best to provide state protection and support for children was high on the policy agenda. The Labour governments from 1997-2010 had pledged to eradicate child poverty within 20 years, and that promise and the legislation that followed it breathed new life into the ongoing debate about the type and level of financial support that society and the state should be providing for children and their families. Central to that debate was the issue of where the balance should be struck between state support for children and state intervention in the private realm of family life. Too much support for children may encourage people to have more children (considered a legitimate use of the social security system in some countries), or might increase the risk of family dissolution; too little support, and children would be left to the vagaries of individual family circumstances without any recognition of their social rights and values. Provision of financial support for children and their families is therefore ‘linked to deep-rooted moral and ideological questions of freedom, dependency, care and mutual responsibility’ (Smith, 1998, p 16). Social security provisions have an impact on many areas of children’s lives, and there is a considerable diversity in the type and level of support that is provided. Benefits for children fall into several different categories, and these may have different rules, aims and intentions, and treat children differently according to age or number of siblings, for example.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "fertility incentive of child benefits (mentioned)", "mechanism": "state child benefits", "direction": "forward", "reason": "Policy discussion of state support for children that mentions fertility incentives, but concerns child benefits not the OAS/pension channel.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Social%20security%20support%20for%20children"}, {"id": "W7163649056", "group": "uncertain", "title": "Supplementary file 1_A study on the intergenerational transmission of fertility levels in Northeast China.docx", "year": null, "venue": null, "authors": null, "abstract": "Drawing on social embedding theory and intergenerational transmission theory, this study focuses on Northeast China and uses data from the 2022 China Family Panel Studies (CFPS) to construct a two-dimensional analytical framework examining fertility intentions and fertility behavior. It explores the intergenerational transmission effects of fertility levels from parents to children, as well as the heterogeneity of these effects. The findings reveal that fertility levels in Northeast China exhibit significant negative intergenerational transmission. Parental attitudes and behaviors toward childbearing influence adult children’s fertility decisions through family socialization: the greater the number of siblings in the family of origin, the lower the fertility intentions and actual number of children among the offspring. This transmission effect shows marked heterogeneity across groups, being strongest among those in poorest health and those without pension insurance.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "fertility intentions and behavior", "mechanism": "intergenerational transmission (pension insurance as moderator)", "direction": "forward", "reason": "Supplementary file of the intergenerational-transmission study; pension only a moderator.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Supplementary%20file%201_A%20study%20on%20the%20intergenerational%20transmission%20of%20fertility%20levels%20in%20Northeast%20China.docx"}, {"id": "W7135820972", "group": "uncertain", "title": "Taking into Account Number of Children in Pension System", "year": null, "venue": null, "authors": null, "abstract": "In this thesis is introduced unusual approach of pension system which takes into account number of behaved children. Attention is given to evaluation and comparison of the specific proposals of this approach if they can contribute to financial sustainability of the pension system. The theoretical part of the thesis is focused on classification of pension systems generally and characterization of the pension system in the Czech Republic. In the practical part of my thesis, the comparison between costs for raising a child and the state children financial support is shown on the theoretical example for parents with average salaries. Finally there are two recommended proposals of pension system which take into account number of children. The first one is based on implementation of mandatory funded pillar. The second concept operates within pay-as-you-go system with implementation of generation fund. The generation fund represents financial reserve to cover pensions in the period when productive generation will not be able to finance pensions sufficiently.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "pension system sustainability", "mechanism": "child-credited pension design (Demeny-style)", "direction": "reverse", "reason": "Thesis on pension proposals that credit number of children for sustainability; engages OAS-fertility nexus but no fertility estimate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Taking%20into%20Account%20Number%20of%20Children%20in%20Pension%20System"}, {"id": "W2079333811", "group": "uncertain", "title": "Taxation and Intergenerational Transfers with Family-Size Heterogeneity: Do Parents with More Children Prefer Higher Taxes?", "year": null, "venue": null, "authors": null, "abstract": "This paper examines the implications of family size heterogeneity for Ricardian households and employs survey data to determine whether or not individual household preferences towards taxation conform to the Ricardian model. Using a dynastic model of intergenerational linkages, we show that the expected size of the dynastic family serves as an index of the strength of its intergenerational link to future generations. Heterogeneity in family size leads to conflicting preferences across households over the intertemporal allocation of taxes, with households with larger expected families in favor of deficit reductions. Aggregating over the heterogeneous responses to a tax cut results in a Keynesian propensity to consume, even with operative bequest motives and lump sum taxation. Using the frequency distribution of family size for the U.S., the model yields an increase in aggregate consumption of about 20 cents for every $1 in tax cuts. We test the prediction relating family size and tax preferences using survey data from the General Social Survey. Controlling for numerous demographic and socio-economic characteristics of the respondents, we find that, consistent with the model, parents with more children prefer higher taxes. We conclude that family size heterogeneity can potentially reconcile Ricardian behavior at the household level with the estimates of a Keynesian response of aggregate consumption to tax cuts.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "tax preferences", "mechanism": "family-size heterogeneity / bequest motive", "direction": "reverse", "reason": "Intergenerational transfers and family size but outcome is tax preferences, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Taxation%20and%20Intergenerational%20Transfers%20with%20Family-Size%20Heterogeneity%3A%20Do%20Parents%20with%20More%20Children%20Prefer%20Higher%20Taxes%3F"}, {"id": "W2350154603", "group": "uncertain", "title": "The Analysis of Chinese Financing Balance of Social Security Pressed By Below-replacement Fertility and Population Aging", "year": null, "venue": null, "authors": null, "abstract": "The influence of financing balance of the social security pressed by belowreplacement fertility and population aging should be considered on the foundation of four systems: population、labor market、social security and economic environment. From the forecast of financing balance by means of oneperiod and periods balance from 2005 to 2050 years we can see that, population aging increases the support rate through urbanization rate、labor participation rate、unemployment rate, then changes handin rate and accumulating rate. Compared to decreasing the substitute rate, heightening the retirement age is a much more effective way to relief the pressure.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "social security financing balance", "mechanism": "low fertility / aging pressure on pension finances", "direction": "reverse", "reason": "fiscal projection of below-replacement fertility's pressure on social security, not OAS→fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Analysis%20of%20Chinese%20Financing%20Balance%20of%20Social%20Security%20Pressed%20By%20Below-replacement%20Fertility%20and%20Population%20Aging"}, {"id": "W4407531642", "group": "uncertain", "title": "The associations of cash transfers with parental investment and couples’ fertility among low-income Serbian Roma", "year": null, "venue": null, "authors": null, "abstract": "Welfare incentives, by providing parents access to certain resources, may increase the reliability of parental investment returns and thus increase opportunities to invest in offspring quality vs. quantity and eventually a drop in fertility. Using the Multiple Indicator Cluster Survey 6 for Serbian Roma, this study examined whether improvements in resources, driven by cash transfers, encouraged parental greater engagement per child and a drop in fertility. The sample included 1095 Roma couples whereas a couple's number of biological children by number of years married was used as a proxy for fertility. The results imply that Roma parental response to shifts in environmental risk did not result in more parental time and lower birth rate: parental investment was lower in the welfare households, presently associated with a higher birth rate. Roma paternal investment dropped in the presence of stepchildren and rose in the presence of biological children, allowing mothers to divert their attention to reproduction. Cash transfers may compensate for the additional costs of an extra child and maintain fertility. Despite the amounts received, or the assumed improvements brought about, the changes may have not be perceived as sufficient enough to cause a shift in parental behavior and a drop in fertility.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "fertility and parental investment", "mechanism": "welfare cash transfers", "direction": "forward", "reason": "Cash-transfer->fertility among Roma, but transfers are welfare not old-age-security.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20associations%20of%20cash%20transfers%20with%20parental%20investment%20and%20couples%E2%80%99%20fertility%20among%20low-income%20Serbian%20Roma"}, {"id": "W2218933715", "group": "uncertain", "title": "The Elasticity of Intergenerational Substitution, Parental Altruism, and Fertility Choice", "year": null, "venue": null, "authors": null, "abstract": "Abstract Dynastic models common in macroeconomics use a single parameter to control the willingness of individuals to substitute consumption both intertemporally, or across periods, and intergenerationally, or across parents and their children. This article defines the concept of elasticity of intergenerational substitution (EGS), and extends a standard dynastic model in order to disentangle the EGS from the EIS, or elasticity of intertemporal substitution. A calibrated version of the model lends strong support to the notion that the EGS is significantly larger than one. In contrast, estimates of the EIS suggests that it is at most one. What disciplines the identification is the need to match empirically plausible fertility rates for the U.S. We illustrate the potential role of the EGS in macroeconomics.", "is_gold": false, "tier": 3, "evidence_type": "structural", "cell": "OFF", "outcome": "fertility rates", "mechanism": "parental altruism / intergenerational substitution", "direction": "forward", "reason": "Dynastic fertility-choice model via intergenerational substitution/altruism, not the OAS motive; plausibly adjacent.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Elasticity%20of%20Intergenerational%20Substitution%2C%20Parental%20Altruism%2C%20and%20Fertility%20Choice"}, {"id": "W2759240757", "group": "uncertain", "title": "The Impact of Raising Children on Retirement Security", "year": null, "venue": null, "authors": null, "abstract": "Children are expensive; they require food, clothing, childcare, and an education. So, one might think that households with children would end up less well prepared for retirement than those without. But raising children is temporary, and the lifecycle model used by economists suggests two ways that parents might not endanger their retirement. One option is for parents to keep household consumption steady over time, but sharply curtail spending on themselves when they have children at home. The other is to have households plan for higher consumption while the children are at home and lower consumption when the children leave and then in retirement. Either way households would accumulate enough wealth to maintain their standard of living in retirement. But households may not behave optimally; they may increase household spending when they have children and maintain spending at that elevated level even after the children leave home. In this case, households with children may be less prepared for retirement than those without. This brief uses the National Retirement Risk Index(NRRI) to assess the impact of having children on the retirement security of today’s older working households. The NRRI is calculated by comparing households’ projected replacement rates – retirement income as a percentage of pre-retirement income – with target replacement rates that would allow them to maintain their standard of living. These calculations are based on the Federal Reserve’s Survey of Consumer Finances, a triennial survey of a nationally representative sample of U.S. households. As of 2013, the NRRI showed that, even if households worked to age 65 and annuitized all their financial assets (including the receipts from reverse mortgages on their homes), more than half of households were a", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "retirement preparedness/security", "mechanism": "child-rearing costs affect household retirement saving", "direction": "reverse", "reason": "examines effect of having children on retirement security, not pension effect on fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Impact%20of%20Raising%20Children%20on%20Retirement%20Security"}, {"id": "W2500072955", "group": "uncertain", "title": "The Impact of Social Health Insurance on Household Fertility Decisions", "year": null, "venue": null, "authors": null, "abstract": "While fertility rates generally fall over time as an economy develops, there is also evidence, primarily from developed countries, of pro-cyclical fertility. Fertility rates are correlated with short-run economic fluctuations because women delay pregnancy in poor economic times and periods of uncertainty, and increase fertility when conditions improve. Because health insurance reduces the cost of childbirth and medical care for children, the introduction of social health insurance may have the same effect on fertility as a positive income shock. This paper examines whether the introduction of social health insurance in Ghana had a positive, pro-cyclical effect on fertility decisions. Using data from the 2005/2006 Ghana Living Standards Surveys (GLSS) conducted shortly after the roll out of the insurance programme and the 2012/2013 GLSS, we compare fertility decisions of insured and uninsured women. To control for self-selection into the insurance programme, we exploit district-level variation in the dates of implementation of the national health insurance to instrument for insurance enrolment. We find evidence of a pro-cyclical fertility effect at the individual level. This is consistent with an increase in national fertility rates observed around the time the programme was introduced. The increase in fertility, however, appears to have been temporary; we find no effect of insurance on fertility in the more recent data.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "fertility decisions", "mechanism": "social health insurance lowers cost of childbirth (income shock)", "direction": "forward", "reason": "Insurance->fertility but channel is childbirth cost/income, not the old-age-security/pension motive.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Impact%20of%20Social%20Health%20Insurance%20on%20Household%20Fertility%20Decisions"}, {"id": "W1159447135", "group": "uncertain", "title": "The impact of the South African old age pension on the educational attainment of children", "year": null, "venue": null, "authors": null, "abstract": "The South African old age pension is the largest cash transfer in the country and its reach extends far beyond the intended beneficiaries, having a significant impact on other household members.Given the prevalence of three and skip generational households in the country the effect that the pension has on children co--residing with pensioners is significant.While the improvement in health status of children is well--documented, the impact on educational attainment is less so.Using 2008 NIDS data this study exploits the age eligibility criteria of the pension to determine what effect the pension has on the educational attainment of co--resident children.The results indicate a strong gender dimension in the impact of the pension, with reference to both the recipient as well as the child.More specifically male pension income has a statistically significant, positive impact on the educational attainment of boys.However, young boys living in households with both a male and a female pensioner have significantly lower educational attainment.Older girls are negatively impacted by the presence of a female pensioner, resulting in lower educational attainment, while older girls benefit from living with pensioners of both sexes.There is no significant impact of the pension on the educational attainment of young girls or older boys.These findings provide a nuanced picture of the impact of the pension on unintended child beneficiaries, which is useful in any social welfare policy debate.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "children's educational attainment", "mechanism": "old-age pension income in household", "direction": "forward", "reason": "Uses old-age pension eligibility to estimate effect on co-resident children's schooling, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20impact%20of%20the%20South%20African%20old%20age%20pension%20on%20the%20educational%20attainment%20of%20children"}, {"id": "W1482203027", "group": "uncertain", "title": "The Intergenerational Transmission of the Value of Children in Contemporary Chinese Families: Taiwan and Mainland China Compared", "year": null, "venue": null, "authors": null, "abstract": "While fertility has been drastically declining in East Asia, mechanisms accounting for the current trend vary. One noticeable mechanism documented is that the changing value of children affects couples’ fertility decisions which in turn affect their subsequent fertility behaviour. This study will examine the intergenerational transmission of the value of children (VOC) among grandmothers, mothers and teenagers in two Chinese societies: Taiwan and Mainland China. We assume that cultural homogeneity interacts with political and social heterogeneity and may result in different values regarding having or not having children. Data are taken from two corresponding VOC surveys from Taiwan (2005-2007) and from Mainland China (2002-2003). We first compare the value of children for Taiwan and Mainland China with special attention to cultural aspects. Two identified factor solutions are generated for both positive (traditional and emotional) and negative (emotional/psychological and familial/social) VOC. Analyses show that intergenerational transmission of the VOC among three generations is more likely to occur for a positive VOC in the Chinese Mainland sample. We suspect that actual fertility experience results in greater resemblance on the VOC between grandmothers and mothers in both research settings. Among selected structural mechanisms, only rural-urban background has an effect on patterns of intergenerational transmission. The paper ends with a discussion on the importance of culture in explaining the intergenerational transmission of the VOC in Chinese societies.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "value of children / fertility decisions", "mechanism": "intergenerational transmission of value of children", "direction": "forward", "reason": "Value-of-children and fertility overlaps conceptually with the old-age-support motive but concerns cultural transmission, not pensions.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Intergenerational%20Transmission%20of%20the%20Value%20of%20Children%20in%20Contemporary%20Chinese%20Families%3A%20Taiwan%20and%20Mainland%20China%20Compared"}, {"id": "W1498426071", "group": "uncertain", "title": "The One-Child Policy and Household Savings", "year": null, "venue": null, "authors": null, "abstract": "We ask how much the advent of the ‘one-child policy ’ can explain the sharp rise in China’s house-hold saving rate, and its distinct age-specific saving behaviour in the last three decades. In a life-cycle model with endogenous fertility, intergenerational transfers and human capital accumulation, we show a macroeconomic and a microeconomic channel through which restrictions in fertility raise aggregate savings. The macro-channel operates through a shift in the composition of demographics and income across generations. The micro-channel alters saving behavior and education decisions at the individ-ual level. Our quantitative OLG model calibrated to household level data shows that the policy can account for a third to 60 % of the rise in aggregate saving rate. Equally important, it can capture much of the distinct shift in the level and shape of the age-saving profile observed from micro-level data estimates. We then use data on twins (born under the one child policy) as an out-of-sample check to our quantitative results; estimates on saving and education decisions are decidedly close between model and data.", "is_gold": false, "tier": 3, "evidence_type": "structural", "cell": "OFF", "outcome": "household saving rate", "mechanism": "fertility restriction, intergenerational transfers, old-age support substitution", "direction": "reverse", "reason": "One-child-policy fertility shock to savings via life-cycle/intergenerational-transfer channel; touches OAS mechanism but outcome is savings, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20One-Child%20Policy%20and%20Household%20Savings"}, {"id": "W161360622", "group": "uncertain", "title": "The One-Child Policy and Household Savings in China", "year": null, "venue": null, "authors": null, "abstract": "This paper analyzes the impact of the 'one child policy' in China on its household saving behavior. First, it develops a life-cycle model with endogenous fertility, intergenerational transfers and human capital accumulation. We show a macroeconomic and a microeconomic channel of a fall in fertility on raising aggregate household saving: at the macroeconomic level, the population composition shifts initially towards the middle-agedâ€”the high savers of the economy. At the microeconomic level, (1) expenditures of children fallâ€”despite higher education investment in each childâ€”as quantity substitutes for quality; (2) middle-aged save additionally for retirement in anticipation of reduced transfers from their only child. Second, our quantitative model implies policy-induced changes in aggregate savings and age-saving profiles broadly consistent with estimates from Chinese household-level data. Third, an empirical study using the birth of twins as a source of exogenous increase in fertility is shown to support the micro-economic channels we highlight. Overall, our estimation suggests that the policy is able to account for 30% to 50% of the rise in household savings rate since its implementation in 1980.", "is_gold": false, "tier": 3, "evidence_type": "structural", "cell": "OFF", "outcome": "household savings rate", "mechanism": "reduced fertility lowers expected old-age transfers from children, raising precautionary retirement saving", "direction": "reverse", "reason": "invokes old-age-support motive but the estimated effect is on savings, not fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20One-Child%20Policy%20and%20Household%20Savings%20in%20China"}, {"id": "W2186289715", "group": "uncertain", "title": "The One-Child Policy and Household Savings in China* PRELIMINARY", "year": null, "venue": null, "authors": null, "abstract": "This paper analyzes the impact of the ‘one child policy’ in China on its household saving behavior. First, it develops a life-cycle model with endogenous fertility, intergenerational transfers and human capital accumulation. We show a macroeconomic and a microeconomic channel of a fall in fertility on raising aggregate household saving: at the macroeconomic level, the population composition shifts initially towards the middle-aged—the high savers of the economy. At the microeconomic level, (1) expenditures of children fall—despite higher education investment in each child—as quantity substitutes for quality; (2) middle-aged save additionally for retirement in anticipation of reduced transfers from their only child. Second, our quantitative model implies policy-induced changes in aggregate savings and age-saving profiles broadly consistent with estimates from Chinese household-level data. Third, an empirical study using the birth of twins as a source of exogenous increase in fertility is shown to support the micro-economic channels we highlight. Overall, our estimation suggests that the policy is able to account for 30% to 50% of the rise in household savings rate since its implementation in 1980.", "is_gold": false, "tier": 3, "evidence_type": "structural", "cell": "OFF", "outcome": "household savings rate", "mechanism": "reduced fertility lowers expected old-age transfers from children, raising retirement saving", "direction": "reverse", "reason": "duplicate of one-child-policy savings paper; OAS motive present but estimated effect is on savings", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20One-Child%20Policy%20and%20Household%20Savings%20in%20China%2A%20PRELIMINARY"}, {"id": "W2134613747", "group": "uncertain", "title": "The Value of Children and Immigrants in a Pay-As-You-Go Pension System: A Proposal for a Partial Transition to a Funded System", "year": null, "venue": null, "authors": null, "abstract": "It is shown that the net fiscal externality created by an additional member of a pay-as-you-go-pension system that is endowed with individual accounts equals the gross contributions of this member. In Germany, this equals about 175, 000 Deutsche marks. The paper uses this information to design a hybrid funded system that avoids this externality and improves the public pension system under equity and efficiency considerations.", "is_gold": true, "tier": 3, "evidence_type": "theory", "cell": "OFF", "outcome": "fiscal externality / pension design", "mechanism": "value of children in PAYG pension system", "direction": "n/a", "reason": "Focuses on fiscal value of children/immigrants for pension design, not the pension->fertility effect", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Value%20of%20Children%20and%20Immigrants%20in%20a%20Pay-As-You-Go%20Pension%20System%3A%20A%20Proposal%20for%20a%20Partial%20Transition%20to%20a%20Funded%20System"}, {"id": "W2336459513", "group": "uncertain", "title": "The Zambian Government Unconditional Social Cash Transfer Programme Does not Increase Fertility", "year": null, "venue": null, "authors": null, "abstract": "This is the first study from sub-Saharan Africa examining the relation between cash transfers and fertility using a large-sample social experiment design and reporting fertility histories of individual women. The findings are important because they provide strong evidence that a social protection programme targeted to families with young children does not create the unintended effect of increased fertility.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "fertility", "mechanism": "unconditional social cash transfer to families with young children", "direction": "forward", "reason": "Experimental cash-transfer effect on fertility, but the treatment is a child-targeted social transfer, not an old-age pension/OAS instrument.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Zambian%20Government%20Unconditional%20Social%20Cash%20Transfer%20Programme%20Does%20not%20Increase%20Fertility"}, {"id": "W4235268563", "group": "uncertain", "title": "Unconditional Government Social Cash Transfers in Africa do not Increase Fertility", "year": null, "venue": null, "authors": null, "abstract": "A common perception surrounding the design and implementation of social cash transfers is that those targeted to families with young children will incentivize families to have more children. To date, however, research on unconditional cash transfer programmes in Africa (including Kenya, Malawi, South Africa and Zambia) have demonstrated no impacts of cash transfer programmes on increased fertility. Examples are given of how some design features capable of minimizing the fertili
