 the social security coverage rate and fertility rate have a negative relationship, and the impact effect is more indirect. The research results of this paper are helpful to understand the impact mechanism of fertility rate from a macro perspective, and provide reference for the Chinese government to improve fertility rate through multiple channels.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility willingness / fertility rate", "mechanism": "social security expenditure and coverage crowding out old-age support", "direction": "forward", "reason": "OECD panel two-way fixed-effects estimate of social security level on fertility; forward empirical effect on fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Impact%20of%20Social%20Security%20on%20Fertility%20Willingness%20in%20OECD%20Countries"}, {"id": "W3153555531", "group": "pooling", "title": "The Introduction of Bismarck's Social Security System and its Effects on Marriage and Fertility in Prussia", "year": null, "venue": null, "authors": null, "abstract": "Abstract Economists have long argued that introducing social insurance will reduce fertility. The hypothesis relies on standard models: if children are desirable in part because they provide security in case of disability or old age, then State programs that provide insurance against these events should induce couples to substitute away from children in the allocation of wealth. We test this claim using the introduction of social insurance in Germany in the period 1881–1910. Bismarck's social insurance scheme had three pillars: health insurance, workplace accident insurance, and an old‐age pension. Earlier studies typically focus on the pension alone; we consider all three pillars. We find that Bismarck's social insurance system affected fertility overall only via its effects on the incentive to marry. The old‐age insurance by itself tended to reduce marriages, but the health and accident insurance components had the opposite effect. For people exposed to all three pillars of social insurance, the two effects cancelled each other and the aggregate effect on fertility was muted. fertility transition; economics; social insurance", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "marriage and marital fertility", "mechanism": "introduction of Bismarck social insurance (old-age pension pillar)", "direction": "forward", "reason": "DiD estimate of Bismarck social insurance on fertility/marriage in Prussia; core forward empirical cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Introduction%20of%20Bismarck%27s%20Social%20Security%20System%20and%20its%20Effects%20on%20Marriage%20and%20Fertility%20in%20Prussia"}, {"id": "W4389499749", "group": "pooling", "title": "The Security Dem and for Children in Peninsular Malaysia.", "year": null, "venue": null, "authors": null, "abstract": "The subject of this dissertation is the hypothesis that children are dem and ed in part to ensure adequate consumption levels to their parents in old age and to cope with other sources of risk in low income countries such as Malaysia. The importance of the security motive hinges on capital and labor markets failing to provide households with the means for protecting themselves against adverse economic circumstances. A theoretical model shows that if parents take the schooling level of their children as a given, they will choose to have fewer children when an income-transferring pension scheme is introduced. Ceteris paribus, households facing lower future income or more variable future income have greater dem and for children. Risk aversion alone is not a sufficient condition for these results to take place. When parents choose both the level of schooling to provide for their children and the number of children to have, the comparative static results are no longer unequivocal. There is a strong presumption, because of the quantity-quality tradeoff, that if the relationship between risk and fertility is positive, then the relationship between risk and schooling will be negative (or vice versa). We also expect that higher income households will react less strongly to risk. The data indicate that Malaysian women view inadequate income in old age and sickness as primary disadvantages of small families. Women who are widowed, divorced or separated expect that their children will cover much more of their expenses at age 55 than their married counterparts. Therefore, it seems that children are expected to help their parents in times of need. The equations estimated to explain family size and schooling are the focus of the empirical work, with care taken to account for probable ", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility (family size) & schooling", "mechanism": "old-age-security / insurance demand for children; pension introduction", "direction": "forward", "reason": "theory+empirical test that pension introduction reduces fertility (security demand for children)", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=The%20Security%20Dem%20and%20for%20Children%20in%20Peninsular%20Malaysia."}, {"id": "W7128403021", "group": "pooling", "title": "Unveiling the ripple effect: how long-term care insurance alters family fertility decisions in China", "year": null, "venue": null, "authors": null, "abstract": "This study employs a staggered difference-in-differences (DID) method to investigate the impact of long-term care insurance (LTCI) on family fertility decisions using longitudinal data from the Chinese Family Panel Studies. The findings suggest that LTCI significantly lowers the first childbirth age (FCA) among female offspring while reducing the overall number of births (NOB) in families. Moreover, this impact is more pronounced for families with lower education concern, higher family-oriented fertility motivation, and higher traditional concepts. Finally, mechanism analysis reveals that LTCI influences family fertility decisions through its effects on employment, resource allocation, and health.", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "first childbirth age and number of births", "mechanism": "long-term care insurance reduces reliance on children for old-age care", "direction": "forward", "reason": "Staggered DID estimates effect of old-age (long-term care) social insurance on family fertility decisions, forward direction.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Unveiling%20the%20ripple%20effect%3A%20how%20long-term%20care%20insurance%20alters%20family%20fertility%20decisions%20in%20China"}, {"id": "W4388062597", "group": "pooling", "title": "Using Qualitative Data for Understanding Old-Age Security and Fertility", "year": null, "venue": null, "authors": null, "abstract": "Abstract The reliance of parents on children for support and care during their elderly years is typically cited as a crucial prop of high fertility and a barrier to fertility transition by demographers (e.g. Caldwell 1977). In many societies where alternative forms of old-age support are lacking, adult children take on paramount importance for parents in their old age when physical health is impaired and the ability to perform economic activities is in decline. Two extensive reviews of the theoretical arguments and empirical research on the so-called ‘old-age security motive’ for having children exist, although both are written primarily from an economic perspective (Nugent 1985; Nugent and Anker 1990).", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility / fertility transition", "mechanism": "old-age-security motive for children", "direction": "forward", "reason": "Qualitative empirical treatment of the old-age-security motive and its role in fertility, forward direction.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Using%20Qualitative%20Data%20for%20Understanding%20Old-Age%20Security%20and%20Fertility"}, {"id": "W4299843965", "group": "pooling", "title": "What explains fertilit? Evidence from Italian Pension reforms", "year": null, "venue": null, "authors": null, "abstract": "Why do people have kids in developed societies? We propose an empirical test of two economic theories of fertility — children as “consumption” or “investment” good. We use as a natural experiment the Italian pension reforms of the 90s, which by decreasing expected pension benefits generated a large negative income effect, with a sharp discontinuity across workers. This policy experiment is particularly well suited, since lower future pensions are expected to have differential effects on fertility under the “consumption” and \"investment\" theories. Empirical analyses identify a causal, robust positive effect of less generous future pensions on postreform fertility. These findings are consistent with an “old-age security” motive also for contemporary fertility in advanced societies or with the original Becker- Lewis (1973) version of the “consumption” theory, based on the interaction between quantity and quality of children.", "is_gold": false, "tier": 2, "evidence_type": "quasi-experimental", "cell": "PRIMARY", "outcome": "fertility (post-reform births)", "mechanism": "old-age security / lower expected pension benefits", "direction": "forward", "reason": "Italian pension reform natural experiment identifies causal positive effect of less generous pensions on fertility - the poolable forward cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=What%20explains%20fertilit%3F%20Evidence%20from%20Italian%20Pension%20reforms"}, {"id": "W2100923443", "group": "pooling", "title": "Women's status and fertility in developing countries: Son preference and economic security", "year": null, "venue": null, "authors": null, "abstract": "The relationship between women's status, which is defined in terms of the degree to which they are economically dependent on men, and fertility in developing countries is examined. The paper adopts a particular theoretical perspective regarding fertility determinants and explores the implications of women's status within that context. This perspectives gives special attention to the value of children as security assets in settings where public welfare assistance is minimal or non-existent and financial and insurance markets are poorly developed. In this context, women's economic status, and the institutional factors that create a degree of dependence, determine the relevance of sex of children in defining security goals. High dependence results is defining security goals in terms of surviving sons. Given similar security needs, and other things being equal, fertility will be considerably higher in settings where there is a strong preference for sons than in settings where son preference is weak. A cross-national empirical analysis is presented that supports this argument.", "is_gold": false, "tier": 2, "evidence_type": "observational", "cell": "PRIMARY", "outcome": "fertility", "mechanism": "value of children as old-age security assets / son preference", "direction": "forward", "reason": "Cross-national empirical test of the old-age economic-security value of children on fertility (forward).", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Women%27s%20status%20and%20fertility%20in%20developing%20countries%3A%20Son%20preference%20and%20economic%20security"}], "uncertain": [{"id": "W2057674663", "group": "uncertain", "title": "<i>Report of the Illinois Public Aid Commission Covering the Period 1943-1944</i>.<i>Increased Costs for Old Age Pensions in Illinois: Should Financially Able Children be Relieved of Responsibility for Aiding Their Needy Parents</i>.", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "filial-support/pension policy", "mechanism": "old-age pensions and children's responsibility for needy parents", "direction": "reverse", "reason": "Old-age-pension policy and children's support duties; OAS-motive adjacent but no fertility outcome.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=%3Ci%3EReport%20of%20the%20Illinois%20Public%20Aid%20Commission%20Covering%20the%20Period%201943-1944%3C/i%3E.%3Ci%3EIncreased%20Costs%20for%20Old%20Age%20Pensions%20in%20Illinois%3A%20Should%20Financially%20Able%20Children%20be%20Relieved%20of%20Responsibility%20for%20Aiding%20Their%20Needy%20Parents%3C/i%3E."}, {"id": "W24128513", "group": "uncertain", "title": "A feasibility study on the only-child dual insurance and parental old-age pension systems.", "year": null, "venue": null, "authors": null, "abstract": "The prospects for expanding China's only-child insurance scheme into an old-age pension system is explored.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "pension-scheme feasibility for only-child parents", "mechanism": "old-age pension for one-child families", "direction": "n/a", "reason": "feasibility of expanding only-child insurance into a pension, sparse abstract", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=A%20feasibility%20study%20on%20the%20only-child%20dual%20insurance%20and%20parental%20old-age%20pension%20systems."}, {"id": "W7163402961", "group": "uncertain", "title": "A study on the intergenerational transmission of fertility levels in Northeast China", "year": null, "venue": null, "authors": null, "abstract": "Drawing on social embedding theory and intergenerational transmission theory, this study focuses on Northeast China and uses data from the 2022 China Family Panel Studies (CFPS) to construct a two-dimensional analytical framework examining fertility intentions and fertility behavior. It explores the intergenerational transmission effects of fertility levels from parents to children, as well as the heterogeneity of these effects. The findings reveal that fertility levels in Northeast China exhibit significant negative intergenerational transmission. Parental attitudes and behaviors toward childbearing influence adult children’s fertility decisions through family socialization: the greater the number of siblings in the family of origin, the lower the fertility intentions and actual number of children among the offspring. This transmission effect shows marked heterogeneity across groups, being strongest among those in poorest health and those without pension insurance.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "fertility intentions and behavior", "mechanism": "intergenerational transmission (pension insurance as moderator)", "direction": "forward", "reason": "Core is intergenerational fertility transmission; pension insurance appears only as a moderator.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=A%20study%20on%20the%20intergenerational%20transmission%20of%20fertility%20levels%20in%20Northeast%20China"}, {"id": "W2883841160", "group": "uncertain", "title": "Analysis of the Causes of Low Fertility Rate and Study of Family Social Security System Against the Background of qUniversal Two-Childq Policy", "year": null, "venue": null, "authors": null, "abstract": "The main causes of low fertility rates analyzed,which are heavy economic burdens as well as stress to families, and there is no corresponding family social security system. We compared with the existing fertility system in China and the family social security system in Western developed countries, and translated the official data on the birth rate of newborns since the implementation of the Two-child policy in China, in order to propose and improve Chinese family social security system.", "is_gold": false, "tier": 3, "evidence_type": "other", "cell": "OFF", "outcome": "low fertility rate", "mechanism": "family social security support", "direction": "forward", "reason": "discusses causes of low fertility and family social security, not the OAS motive", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Analysis%20of%20the%20Causes%20of%20Low%20Fertility%20Rate%20and%20Study%20of%20Family%20Social%20Security%20System%20Against%20the%20Background%20of%20qUniversal%20Two-Childq%20Policy"}, {"id": "W7143773991", "group": "uncertain", "title": "Analyzing the Effect of Number of Children on Japan’s Household Savings Rate Using the Japan Household Panel Survey", "year": null, "venue": null, "authors": null, "abstract": "Despite an increase in Japan’s household savings rate since 2010s, the number of births and child dependency ratio have been declining, in line with low fertility and aging trends. We investigate the effect of number of children on the household savings rate, a key characteristic of Japan’s demographic structure. Using both a theoretical model and an empirical analysis, we employ panel data from the Japan Household Panel Survey from 2011 to 2019. A fixed effects model, robustness tests, and heterogeneity analysis examined the influence of number of children and child dependency ratio on the household savings rate and mechanisms thereof. Evidently, a decline in number of children has a positive effect on the household savings rate. Further, the effect of this decline on the savings rate varies by the child’s gender, education level, number of children, household income, and family structure, with the most pronounced effect for households with male children, high-school-aged children, four or more children, single-parent households, and low-income households. Moreover, a decline in number of children increases household income and reduces household consumption, particularly education and living costs, thereby increasing the household savings rate. Finally, parents with higher education aspirations for their children tend to invest more in education. Overall, although the decline in number of children may have contributed to the rise in Japan’s household savings rate in the 2010s, this trend is unlikely to persist in the long run. Optimizing childbirth policies and improving birth rates are essential for sustaining Japan’s future economic growth.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "household savings rate", "mechanism": "number of children", "direction": "reverse", "reason": "Number of children -> savings rate; reverse and off-outcome relative to OAS->fertility cell.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Analyzing%20the%20Effect%20of%20Number%20of%20Children%20on%20Japan%E2%80%99s%20Household%20Savings%20Rate%20Using%20the%20Japan%20Household%20Panel%20Survey"}, {"id": "W4395011166", "group": "uncertain", "title": "Boomerang children and parental retirement outcomes", "year": null, "venue": null, "authors": null, "abstract": "Abstract As the share of U.S. adult children living with their parents increases, it is important to understand how children who “boomerang” back home impact their parents in their pre-retirement and post-retirement years. We use data from the Health and Retirement Study (HRS) to examine the effects of boomerang children on their parents’ labor market expectations and choices, as well as on their wealth, health, and life satisfaction. Event study analysis suggests that boomerang children return home due to short-term instabilities, such as negative shocks to marriage, income, and employment. We find that boomerang children are associated with a small increase in their parents’ subjective probability of working after age 65, and with a temporary increase in their parents’ non-housing debt. However, in the aggregate, we find no clear evidence that boomerang children impact parents’ current or future labor market choices, overall wealth, health, or life satisfaction. (We do find some evidence of an increase in hours worked among parents in the bottom wealth decile). One possible explanation for the lack of aggregate impact is that boomerang children contribute to household expenses. We find that boomerang events are associated with an increase in financial transfers from children to parents, particularly among parents in the bottom half of the wealth distribution.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "parental labor/retirement, wealth, transfers", "mechanism": "adult children co-residence and support to parents", "direction": "reverse", "reason": "Boomerang children affecting parents' retirement, not pension crowd-out of fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Boomerang%20children%20and%20parental%20retirement%20outcomes"}, {"id": "W1994312041", "group": "uncertain", "title": "Child Health and Household Resources in South Africa: Evidence from the Old Age Pension Program", "year": null, "venue": null, "authors": null, "abstract": "This paper presents nonparametric evidence on the effects of the expansion of the Old Age Pension program in South Africa on child health. Did this increase in household resources improve child health and nutrition? Does the gender of the recipient of the pension affect its impact? The answers to these questions have very important policy implications. There is evidence that inadequate nutrition during childhood (and even in utero) affects long-term physical development, as well as the development of cognitive skills. This in turn affects productivity later in life (see Partha Dasgupta, 1993; John Strauss and Duncan Thomas, 1998; T. Paul Schultz, 1999). In the United States, the evidence suggests that monetary transfers to the poor have very little impact on child welfare (Janet Currie, 1995; Susan Mayer, 1997). However, the effects of parental income and monetary transfers on child outcomes are likely to be of greater magnitude among poor households in developing countries. The South African Pension program provides an unusual opportunity to evaluate the possible effects of such a monetary transfer. This paper exploits the rapid increase in the coverage and benefits of the Old Age Pension program in South Africa which took place in the early 1990’s (Anne Case and Angus Deaton, 1998). At the end of the apartheid era, the government committed to achieving parity of benefits and eligibility requirements between whites and Africans. This was achieved mostly by increasing the benefits received by the Africans. In 1993, 80 percent of African women above age 60 and 77 percent of African men above 65 received the pension. The maximum benefit of 370 rands per month (aproximately $3 per day) was equal to half of the minimum wage, and about twice the median income per capita in r", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "child health/nutrition", "mechanism": "Old Age Pension household resources", "direction": "forward", "reason": "South African Old Age Pension expansion -> child health; pension shock but outcome is child health.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Child%20Health%20and%20Household%20Resources%20in%20South%20Africa%3A%20Evidence%20from%20the%20Old%20Age%20Pension%20Program"}, {"id": "W810747496", "group": "uncertain", "title": "Child Welfare in Rural Ethiopia: The role of Transfers, Old Age Support and Child Ability", "year": null, "venue": null, "authors": null, "abstract": "This research examines intrahousehold resource allocation in rural Ethiopia with a focus on education and asset investments in children. Throughout our work we look for potential causes and signs of gender bias in childhood investments. In particular, we first look at whether poverty constrained households substitute the provision of asset and education transfers to their children. For this purpose we use a two-stages-least-squares model of educational demand which controls for the endogeneity of asset transfers. We find a trade-off mechanism between endowments of human capital and bequests to girls but not to boys. Secondly, we investigate the effect of parental transfers on the postmarital residence of children. We look at whether transfers induce old age security from children in the form of a postmarital residence close to the parents. We model postmarital residence using a multinomial logit which controls for the endogeneity of transfers. Our results show that off-springs who receive more assets are more likely to live close to their parents after marriage. On the contrary, more education induces children to leave their home at marriage. Finally, we analyze household choices between education and farm employment of children. We model these choices jointly while looking at how ability affects them. Our findings suggest that in the long-run, more able children accumulate more schooling and less farming experience. However, the latter only applies to boys; farming decisions regarding girls are independent of their ability. In summary, our research addresses four important factors affecting the welfare of children and young people in rural Ethiopia: educational investments, asset transfers, old age security mechanisms and child work decisions.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "child education/asset transfers, postmarital co-residence", "mechanism": "old-age security via transfers inducing children to reside nearby", "direction": "n/a", "reason": "Studies old-age-security mechanisms via co-residence and child investment; no fertility outcome.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Child%20Welfare%20in%20Rural%20Ethiopia%3A%20The%20role%20of%20Transfers%2C%20Old%20Age%20Support%20and%20Child%20Ability"}, {"id": "W4281384809", "group": "uncertain", "title": "Child-to-Parent Intergenerational Transfers, Social Security, and Child Wealth Building", "year": null, "venue": null, "authors": null, "abstract": "I study the relationship among child-to-parent transfers, parents' social security eligibility, and child wealth building. Using data from the Panel Study of Income Dynamics and a regression discontinuity approach, I find that the wealth of adult children increases discontinuously at the parents' Social Security eligibility age for Black, female, and low-income groups. Additionally, the probability that a parent receives monetary transfers decreases discontinuously at the Social Security age for these groups. The effects were not statistically significant for counterpart groups. These findings suggest that by reducing the reliance of parents on their adult children, Social Security may contribute to wealth building among economically disadvantaged households.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "adult-child wealth; child-to-parent transfers", "mechanism": "social security reducing parental reliance on children", "direction": "n/a", "reason": "RD on parents' Social Security eligibility affecting child-to-parent transfers and child wealth; OAS-motive mechanism but outcome is not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Child-to-Parent%20Intergenerational%20Transfers%2C%20Social%20Security%2C%20and%20Child%20Wealth%20Building"}, {"id": "W4415173740", "group": "uncertain", "title": "Children and Household Savings in the Philippines", "year": null, "venue": null, "authors": null, "abstract": "This paper examines the relationship between household savings and family size. Household savings are important indicators for family welfare not only in terms of its investment and income generation prospects but also, and perhaps more importantly given pervasive borrowing constraints and limited social security coverage, because it provides protection from income shortfalls. Descriptive and multivariate evidence on the relationship of household savings and family size are provided. The endogeneity of family size in the household savings equation, as argued for in the old-age security hypothesis, is properly considered by using instrumental variables estimation technique. The paper uses a recent nationally representative household survey in the analysis. The results show that, on average, the impact of additional children on household savings is negative and that the impact is regressive.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "household savings", "mechanism": "old-age-security hypothesis: children substitute for precautionary savings", "direction": "reverse", "reason": "IV test of old-age-security hypothesis but outcome is savings, treating fertility as the cause", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Children%20and%20Household%20Savings%20in%20the%20Philippines"}, {"id": "W4303646148", "group": "uncertain", "title": "Children and Retirement Income Adequacy", "year": null, "venue": null, "authors": null, "abstract": "A typical household spends about $13,000 per year providing each child with food, clothing, shelter, and other essentials of life, with parental expenditures on children totaling 5% of gross domestic product. Several studies have shown that how children are assumed to interact with household expenditures and saving has first-order effects on judgments of the adequacy of retirement saving by US households, yet the effect of children on their parents’ ability and need to save for retirement is unresolved. This article uses data from the Panel Study of Income Dynamics (PSID) to track changes in household spending and saving as children transition to financial independence and parents’ transition from work into retirement. The PSID data accord with an interpretation of the life-cycle model in which parental households consume more and save less during the period children are being raised, but reduce consumption and increase saving as children become economically independent. These results point toward a more optimistic picture of the adequacy of US household retirement savings.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "parental retirement saving adequacy", "mechanism": "cost of children vs. private retirement saving", "direction": "reverse", "reason": "Concerns children and retirement income but measures parents' saving, not pension-driven fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Children%20and%20Retirement%20Income%20Adequacy"}, {"id": "W912762066", "group": "uncertain", "title": "Competing Demands: Financially Dependent Children and Parental Retirement", "year": null, "venue": null, "authors": null, "abstract": "The 1960s through the 1980s saw an expansion of generous pensions allowing workers to retire at younger ages. Since then, pensions have become less generous, and more people are working longer. Although previous research has often focused on financial and pension-related explanations for the postponement of retirement, little research has focused on how family demands shape retirement decisions. Changes in family formation in the second half of the 20th Century include delayed marriage, delayed childbearing, divorce, and remarriage. These trends, combined with the increasing time children are taking to transition to adulthood, means that parents are now more likely to be supporting children as they prepare to retire. This dissertation examines how demands from children affect older parents as they approach retirement. Using data from the Health and Retirement Study, I ask whether parents with adolescent or dependent adult children postpone retirement to later ages than other parents. I examine retirement both prospectively, by comparing parents' retirement expectations across cohorts, and then longitudinally, by modeling one cohort's transition from working to retirement. In both analyses, I focus on the impact of children who are either dependent-aged (&lt;18), college-aged, coresident, or financially dependent. Results from this study show that needs of children do not appear to exert much influence over their parent's retirement plans. Net of parental characteristics, demands from children do not have an independent effect on retirement outcomes. It also does not appear that children in more recent cohorts exert a greater influence on parental retirement despite greater demands from children in recent years. For some subgroups (e.g. unmarried mothers and fathers, bla", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "parental retirement timing", "mechanism": "financially dependent children", "direction": "reverse", "reason": "Dependent children -> parents' retirement decisions; reverse and off-outcome.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Competing%20Demands%3A%20Financially%20Dependent%20Children%20and%20Parental%20Retirement"}, {"id": "W4360985011", "group": "uncertain", "title": "Cross-national differences in the association between intergenerational support and fertility in East Asia", "year": null, "venue": null, "authors": null, "abstract": "In past and contemporary societies, kin presence and support are widely cherished for helping couples contend with parenthood. Thus, it is hypothesized that intergenerational cooperation in raising children influences fertility decisions. Despite the potential benefits of having a supportive family environment, societies with dissimilar social, structural, and geographical conditions may exhibit cross-cultural differences that are characterized by variations in family processes and reproductive outcomes. To demonstrate the influence of context, this study draws on the 2006 and 2016 East Asian Social Survey and uses generalized Poisson regression to investigate cross-national differences in the effect of intergenerational support on fertility in East Asia. The results show distinct patterns in the effect of intergenerational financial support, instrumental support, and geographic proximity on fertility. Financial support and proximity to grandparents are particularly conducive to childbearing among urban families. Instrumental support appears to be more beneficial for societies going through the second phase of the gender revolution (South Korea and Taiwan) than for societies with stronger gender role constraints (Japan). The findings highlight how context underpins the effect of intergenerational support on fertility.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "fertility (number of children)", "mechanism": "intergenerational (grandparental) financial/instrumental support and proximity", "direction": "forward", "reason": "Estimates effect of intergenerational support on fertility in East Asia, but the channel is grandparental support, not the OAS/pension motive.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Cross-national%20differences%20in%20the%20association%20between%20intergenerational%20support%20and%20fertility%20in%20East%20Asia"}, {"id": "W3122416337", "group": "uncertain", "title": "Do Adult Children Matter? The Effects of National Health Insurance on Retirement Behavior: Evidance from Taiwan", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "retirement behavior", "mechanism": "national health insurance / adult children", "direction": "n/a", "reason": "Empty abstract; title links national health insurance and adult children to retirement behavior, an off-outcome, but cannot fully decide.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Do%20Adult%20Children%20Matter%3F%20The%20Effects%20of%20National%20Health%20Insurance%20on%20Retirement%20Behavior%3A%20Evidance%20from%20Taiwan"}, {"id": "W4411729011", "group": "uncertain", "title": "Do Public Transfers Crowd Out Private Transfers from Adult Children to Their Empty-Nest Older Parents in Rural China? The Role of Grandchild Care", "year": null, "venue": null, "authors": null, "abstract": "Rural China has been experiencing a significant rise in empty nesters among older adults, a mixed consequence of contemporary social issues such as population aging, urbanization, and migration. Focusing on rural older populations who have traditionally relied on private transfers from adult children as well as public assistance, this study used data from the China Health and Retirement Longitudinal Study 2018 and the propensity score matching method to investigate the crowding-out effect of China's primary public assistance program, Dibao, on financial transfers from adult children to their empty-nest older parents and older parents' relationship satisfaction with their adult children. Our findings reveal that Dibao significantly reduced financial transfers from adult children to their empty-nest older parents but enhanced older parents' relationship satisfaction with their adult children. Furthermore, this crowding-out effect was more significant in irregular and cash transfers, and among those with lower capability of engaging in grandchild caregiving. These results suggest a complex dynamic wherein Dibao reduced financial contributions from adult children to their older parents in rural China. This study contributes to understanding the mixed effects of social assistance programs on intergenerational transfers and relationships in the context of the rapidly changing social structure in China.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "private intergenerational transfers", "mechanism": "public assistance crowd-out; grandchild care", "direction": "forward", "reason": "Dibao crowds out child-to-parent transfers; crowd-out mechanism but outcome is transfers, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Do%20Public%20Transfers%20Crowd%20Out%20Private%20Transfers%20from%20Adult%20Children%20to%20Their%20Empty-Nest%20Older%20Parents%20in%20Rural%20China%3F%20The%20Role%20of%20Grandchild%20Care"}, {"id": "W4413478120", "group": "uncertain", "title": "Does intergenerational financial support increase fertility willingness: evidence from the Chinese General Social survey", "year": null, "venue": null, "authors": null, "abstract": "China’s demographic structure is undergoing significant strain, characterized by accelerating population ageing and declining birth rates. The increasing female labour market participation has heightened the significance of intergenerational support in fertility decisions. Despite extensive evidence on intergenerational caregiving effects, the interplay between financial transfers and fertility willingness remains poorly understood. Based on data from the China General Social Survey (CGSS), this paper employs ordered probit/logit model and IV ordered probit model to empirically examine the impact of intergenerational financial support on fertility intentions. The results show parental financial support significantly affects both individuals’ desired number of children and the gap between their desired and actual fertility intentions. The effect follows a pattern of ‘initially negative, then positive’, with diminishing marginal returns across different level of fertility willingness. Individuals primarily have more willingness to have one additional child after having intergenerational financial support. Our robustness checks support these findings. Heterogeneity analyses further indicate that intergenerational financial support has a significant effect on the fertility intentions of those aged 31–35, without housing property or with two and more properties. And such effects are evident in families at middle- and high-income level, especially in one-child families, and in regions with above-average fertility rates.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "fertility willingness/intentions", "mechanism": "intergenerational financial support from parents to adult children", "direction": "forward", "reason": "forward effect on fertility intentions but driver is intergenerational transfers, not pensions/OAS motive", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Does%20intergenerational%20financial%20support%20increase%20fertility%20willingness%3A%20evidence%20from%20the%20Chinese%20General%20Social%20survey"}, {"id": "W4406852400", "group": "uncertain", "title": "Does Old Age Social Security Help Children? The Impact of Social Security on Grandchild Resources", "year": null, "venue": null, "authors": null, "abstract": "Though Social Security is typically considered a program to support retirees, nearly one in ten children live in a home with Social Security income. Children are substantially more likely to live with an older adult than they were two decades ago, and they are twice as likely to report Social Security income in their household as traditional cash welfare. We use the sharp increase in eligibility for Social Security benefits at age 62 to investigate the role played by the Social Security program in childhood economic resources among children who live with their grandparents. We do not find that Social Security eligibility increases household income on average, but it is associated with a shift towards Social Security income and reductions in deep poverty. We also see increased availability of household members’ time for home production.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "grandchild household resources/poverty", "mechanism": "Social Security eligibility at 62 -> resources in grandparent households", "direction": "forward", "reason": "Old-age Social Security -> children's household resources; outcome is resources, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Does%20Old%20Age%20Social%20Security%20Help%20Children%3F%20The%20Impact%20of%20Social%20Security%20on%20Grandchild%20Resources"}, {"id": "W4410884758", "group": "uncertain", "title": "Does Old-Age Social Security Help Children? The Impact of Social Security on Grandchild Resources", "year": null, "venue": null, "authors": null, "abstract": "Though Social Security is typically considered a program to support retirees, nearly one in ten children live in a home reporting Social Security income, twice as many as traditional cash welfare. We use the sharp increase in eligibility for Social Security benefits at age 62 to investigate the role that Social Security plays in childhood economic resources among children who live with their grandparents. We do not find that Social Security eligibility increases household income on average, but it is associated with reductions in deep poverty. We also see increased availability of household members' time for home production.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "grandchild household resources/poverty", "mechanism": "Social Security eligibility affects resources in grandparent-headed households", "direction": "forward", "reason": "RD on age-62 Social Security eligibility affecting grandchild resources, not fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Does%20Old-Age%20Social%20Security%20Help%20Children%3F%20The%20Impact%20of%20Social%20Security%20on%20Grandchild%20Resources"}, {"id": "W2886299870", "group": "uncertain", "title": "Does the New Rural Pension Scheme crowd out private transfers from children to parents? Empirical evidence from China", "year": null, "venue": null, "authors": null, "abstract": "Purpose The purpose of this paper is to examine the effect of New Rural Pension Scheme (NRPS) on the private transfer behavior of the non-co-resident adult children to their elderly parents in rural China, and hence address the income redistribution effectiveness of public program for the elderly in rural China. Design/methodology/approach Pooled data from two waves of the China Health and Retirement Longitudinal Study and the combination of regression discontinuity design and difference in difference method are used to perform the analysis. Findings No evidence is found that pension payment from NRPS program does significantly crowd out the economic support from the adult children to their elder parents. The heterogeneous effects at different income percentile indicate that pension payment significantly increases the probability of receiving gross transfers and likelihood of the net transfer being positive for those elderly individuals with low income; in particular, the distinctive “family binding” arrangement may dramatically contribute to increasing the probability of receiving private transfers for the pension recipients. Originality/value The empirical findings would have far-reaching implications for the efficacy of public transfer or re-distributive programs such as NRPS; for the rural elderly, in particular, the unique “family binding” mechanism under the NRPS program may have positive welfare effects on the intended beneficiaries. Furthermore, an understanding of the inter-linkage between informal arrangements of elderly support and social re-distributive program provides further insight into the design of social security systems targeted to the vulnerable group in developing countries.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "private transfers from children to parents", "mechanism": "public pension (NRPS) crowd-out of family support", "direction": "forward", "reason": "Tests pension crowd-out of family support (OAS logic) but outcome is transfers, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Does%20the%20New%20Rural%20Pension%20Scheme%20crowd%20out%20private%20transfers%20from%20children%20to%20parents%3F%20Empirical%20evidence%20from%20China"}, {"id": "W2972334576", "group": "uncertain", "title": "Earning Risks, Parental Schooling Investment, and Old-Age Income Support From Children", "year": null, "venue": null, "authors": null, "abstract": "Old-age income support is an important motive for parents to invest in schooling of their children in developing countries. At the time parents choose schooling investment for their children, both parental future income and return from schooling are uncertain. This paper analyzes effects of parental income risk and human capital investment risk on parental schooling investment using alternative models (altruism and educational loan model) of determination of old-age income support in a model with intergenerational transfers. It finds that effects of these risks on schooling investment depend on whether old-age income support is state-contingent. When income support is state-contingent, increasing parental income risk (human capital investment risk) has a positive (negative) effect on schooling investment. However, when income support is not state-contingent, effects of these two types of risks may get reversed. Numerical analysis using Indonesian data suggests that risks have significant negative effect on schooling investment.", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "OFF", "outcome": "parental schooling investment", "mechanism": "old-age income support from children", "direction": "forward", "reason": "Old-age-support motive modeled, but outcome is child schooling investment, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Earning%20Risks%2C%20Parental%20Schooling%20Investment%2C%20and%20Old-Age%20Income%20Support%20From%20Children"}, {"id": "W2031268801", "group": "uncertain", "title": "Education policy in a non-altruistic model of intergenerational transfers with endogenous fertility", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "THEORY", "outcome": "fertility", "mechanism": "non-altruistic intergenerational transfers", "direction": "forward", "reason": "theoretical model of non-altruistic intergenerational transfers with endogenous fertility, adjacent to OAS motive but framed around education policy", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Education%20policy%20in%20a%20non-altruistic%20model%20of%20intergenerational%20transfers%20with%20endogenous%20fertility"}, {"id": "W2496130293", "group": "uncertain", "title": "Elderly Parents, Adult Children and the Romanian Transnational Family: An Intergenerational Solidarity Approach", "year": null, "venue": null, "authors": null, "abstract": "Abstract Recent demographic changes such as ageing, low-fertility, and large out-migration from Eastern European countries, brought into discussion the vivid question of the future of intergenerational solidarity within families. In the context of increasing geographical mobility of young people in search for better paid jobs, the unmet need for personal assistance among the elderly, the underdeveloped system of care services, Romania knows new dynamics of intergenerational support. Contrary to perspectives that consider spatial proximity between adult children and their elder parents the indisputable enabling factor for intergenerational support transfers (Rossi and Rossi, 1990), emerging literature on transnational families highlights that such tight kinship relations continue to exist even across borders (Baldassar et al., 2007). Using recent data from the nationwide survey “The Impact of Migration on Older Parents Left Behind in Romania” (2011), this paper examines the complex dynamics of intergenerational solidarity involving adult children as transnational migrants and their elder parents who remain at home. The statistical models used indicate the migrants’ role as providers of remittances, but also the ways in which other forms of support are distributed among the dyads. Despite a possible presupposition that parents who were left at home might only be beneficiaries of support, the data show the opposite: elderly persons, depending on their age, were active providers of help as well.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "intergenerational support transfers", "mechanism": "children as old-age support to elderly parents", "direction": "n/a", "reason": "Intergenerational solidarity between adult children and elderly parents touches the old-age-support motive but measures support, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Elderly%20Parents%2C%20Adult%20Children%20and%20the%20Romanian%20Transnational%20Family%3A%20An%20Intergenerational%20Solidarity%20Approach"}, {"id": "W3154804496", "group": "uncertain", "title": "Estimation on Chinese families who lost their only child and the fiscal sustainability of the social assistance system", "year": null, "venue": null, "authors": null, "abstract": "China implemented a universal two-child policy in 2016. But its earlier one-child policy resulted in a large population of one-child parents who face miserable later lives if their only-child passes away before them. China’s Current social assistance to such Shidu families is not supportive enough and provides insufficient coverage. Using demographic methods, this paper estimates both the mortality of only-children and the population of Shidu parents over 49 years-old. Furthermore, it advocates for improvements to the standard of social assistance for Shidu families and measures the financial sustainability of that suggested standard. After analyzing Chinese national census data and China Fertility Status Survey data, we found that the risk of death for a rural only-child was higher than for an urban only-child in every age group. Following the concept of period parity progression, we estimated the scale of Shidu parents, which will gradually increase to a peak of 1.05 million in 2030. Considering present policies and the Shidu parents’ unmet needs, we argue that China’s central government should increase its economic support of such families, include those support policies in a comprehensive social security system, and offer more emotional care.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "social-assistance coverage/fiscal sustainability for bereaved one-child parents", "mechanism": "loss of only-child old-age support under one-child policy", "direction": "reverse", "reason": "Connects fertility (one-child policy) to failure of family old-age support and social-assistance costs, but estimates fiscal sustainability rather than a pension-fertility effect.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Estimation%20on%20Chinese%20families%20who%20lost%20their%20only%20child%20and%20the%20fiscal%20sustainability%20of%20the%20social%20assistance%20system"}, {"id": "W4388062346", "group": "uncertain", "title": "Fertility, Mortality, and Intergenerational Transfers: Comparisons across Steady States", "year": null, "venue": null, "authors": null, "abstract": "Abstract Biological changes over the life-cycle interact with economic incentives and socio-cultural values and institutions to produce life-cycle patterns of earning and consumption. These patterns, while by no means identical in detail across populations, share the general features of consumption in excess of labour earnings in youth and old age. Consumption in excess of labour earnings at these ages is funded, at least in part, from the excess of earnings in the working ages, through what may be called intergenerational transfers. Such transfers take place through the family, the public sector, and the market. In steady state, age-patterns of intergenerational transfers are repeated generation after generation, and we may view them as a means for individuals to smooth their own consumption streams through inter-temporal transfers to themselves. In this sense, the consumption needs and labour efforts of the different age-groups in a population at any instant are a kind of surrogate for those same needs and efforts over the individual life-cycle. When the population is stationary, the correspondence is exact: the proportion of the population at each age is identical to the average proportion at each age over the individual life-cycle (see Preston, 1982).", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "THEORY", "outcome": "fertility and intergenerational transfers", "mechanism": "life-cycle intergenerational transfers via family/public/market", "direction": "forward", "reason": "Theoretical/accounting treatment of fertility, mortality and intergenerational transfers across steady states; unclear if it isolates pension crowd-out of fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Fertility%2C%20Mortality%2C%20and%20Intergenerational%20Transfers%3A%20Comparisons%20across%20Steady%20States"}, {"id": "W4405964394", "group": "uncertain", "title": "FINANCIAL TRANSFERS BETWEEN OLDER FILIPINOS AND THEIR ADULT CHILDREN: THE ROLE OF EDUCATION AND PUBLIC PENSIONS", "year": null, "venue": null, "authors": null, "abstract": "Abstract Objectives The Philippines is expected to transition to an aging society in less than two decades. Provision of resources and safety nets largely befalls family members since government support is limited. This study examines how education and public pensions shape older Filipinos’ financial transfers to and from their adult children. Methods Data on Filipinos aged 60+ with at least one living child came from the 2018 Longitudinal Study of Ageing and Health in the Philippines (n=5,645). Logistic regressions interacting educational attainment and public pension receipt (no pensions, have contribution-based pensions, have social pensions, have both) were ran, controlling for relevant sociodemographic factors, average characteristics of children, and living arrangements. Predicted probabilities were generated and pairwise comparisons were conducted. Results Higher educational attainment and having contribution-based public pensions were associated with higher (decreased) odds of giving (receiving) transfers. Interactive models suggest a modest moderating effect of education and public pension types on giving and receiving financial transfers. Within education level, public pension receivers, especially those with contribution-based pensions, tend to have the highest probability of transferring to children and lowest probability of being exclusively on the receiving end of money transfers. Discussion Public pension receivers being more likely to give downward financial transfer across all educational levels suggests that public transfers for older adults benefit both the intended beneficiaries and their descendants. Additionally, older parents having contribution-based pensions as an income source spares their adult children from providing upward transfers. Results", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "intergenerational financial transfers", "mechanism": "public pensions crowding out reliance on children", "direction": "n/a", "reason": "Studies public pensions shaping transfers between older Filipinos and children (crowd-out mechanism) but outcome is transfers, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=FINANCIAL%20TRANSFERS%20BETWEEN%20OLDER%20FILIPINOS%20AND%20THEIR%20ADULT%20CHILDREN%3A%20THE%20ROLE%20OF%20EDUCATION%20AND%20PUBLIC%20PENSIONS"}, {"id": "W4405968493", "group": "uncertain", "title": "FINANCIAL TRANSFERS BETWEEN OLDER FILIPINOS AND THEIR ADULT CHILDREN: THE ROLE OF EDUCATION AND PUBLIC PENSIONS", "year": null, "venue": null, "authors": null, "abstract": "Abstract Objectives The Philippines is expected to transition to an aging society in less than two decades. Provision of resources and safety nets largely befalls family members since government support is limited. This study examines how education and public pensions shape older Filipinos’ financial transfers to and from their adult children. Methods Data on Filipinos aged 60+ with at least one living child came from the 2018 Longitudinal Study of Ageing and Health in the Philippines (n=5,645). Logistic regressions interacting educational attainment and public pension receipt (no pensions, have contribution-based pensions, have social pensions, have both) were ran, controlling for relevant sociodemographic factors, average characteristics of children, and living arrangements. Predicted probabilities were generated and pairwise comparisons were conducted. Results Higher educational attainment and having contribution-based public pensions were associated with higher (decreased) odds of giving (receiving) transfers. Interactive models suggest a modest moderating effect of education and public pension types on giving and receiving financial transfers. Within education level, public pension receivers, especially those with contribution-based pensions, tend to have the highest probability of transferring to children and lowest probability of being exclusively on the receiving end of money transfers. Discussion Public pension receivers being more likely to give downward financial transfer across all educational levels suggests that public transfers for older adults benefit both the intended beneficiaries and their descendants. Additionally, older parents having contribution-based pensions as an income source spares their adult children from providing upward transfers. Results", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "intergenerational financial transfers", "mechanism": "public pensions crowding out reliance on children", "direction": "n/a", "reason": "Duplicate Filipino-transfers study; pensions affect intergenerational transfers (crowd-out mechanism) but outcome is transfers, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=FINANCIAL%20TRANSFERS%20BETWEEN%20OLDER%20FILIPINOS%20AND%20THEIR%20ADULT%20CHILDREN%3A%20THE%20ROLE%20OF%20EDUCATION%20AND%20PUBLIC%20PENSIONS"}, {"id": "W1992847819", "group": "uncertain", "title": "Financial Transfers from Living Parents to Adult Children: Who Is Helped and Why?", "year": null, "venue": null, "authors": null, "abstract": "A bstract . To what extent can young adult children rely on their parents for financial support? This question will take on added importance if the commitments of the Social Security system put greater strain on the children of retirees. Despite the critical role that parents have in supporting their children, why they help some and not others remains unclear. Findings using two waves of data from the Health and Retirement Study that control for the needs of children and the resources of parents suggest that parents give more inter vivos financial assistance to their disadvantaged children rather than focusing on children most able to give financial help in return. Other measures of child well‐being besides income, including home ownership, education, parental status, and marital status, also suggest that parents help needier children more. Children who live nearby also receive more, a finding consistent with exchange motives or simply the ability of these children to more stridently demand support. Neither altruism nor exchange theories explain why stepchildren receive substantially less support than naturally born or adopted children. The diversity of effects suggests that giving is based on heterogeneous motives—parents may temper their altruism for children by the degree to which they feel responsible and by the stridency of some children in seeking support. Findings are robust upon allowing for unobserved differences across families by estimating fixed effect models.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "inter vivos financial transfers to adult children", "mechanism": "altruism/exchange intergenerational transfer motives", "direction": "n/a", "reason": "Studies intergenerational transfer motives (touching Social Security strain) but outcome is transfers, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Financial%20Transfers%20from%20Living%20Parents%20to%20Adult%20Children%3A%20Who%20Is%20Helped%20and%20Why%3F"}, {"id": "W2210637591", "group": "uncertain", "title": "Government Debt in an Intergenerational Model of Economic Growth Endogenous Fertility and Elastic Labor with an Application to Japan", "year": null, "venue": null, "authors": null, "abstract": "We derive the social optimum and optimal government debt in an intergenerational model of growth with fertility, elastic labor, human capital externalities and a non-convex feasible set. Debt through lump-sum taxation increases leisure and labor, reduces fertility, and can achieve the social optimum with education subsidization. Debt and education subsidization through labor income taxation can generate similar effects on fertility and labor. Quantitatively, the model can yield changes in output growth, fertility, and labor resembling observations in Japan with rising debt since 1970. From this calibration, the optimal debt-output ratio is 12.3% and excessive debt causes substantial welfare losses.", "is_gold": false, "tier": 3, "evidence_type": "structural", "cell": "OFF", "outcome": "fertility, labor, growth", "mechanism": "government debt and education subsidization", "direction": "forward", "reason": "Intergenerational model with endogenous fertility, but the fiscal instrument is government debt/education subsidy, not the OAS/pension channel.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Government%20Debt%20in%20an%20Intergenerational%20Model%20of%20Economic%20Growth%20Endogenous%20Fertility%20and%20Elastic%20Labor%20with%20an%20Application%20to%20Japan"}, {"id": "W3125444103", "group": "uncertain", "title": "Grandparental availability for child care and maternal labor force participation: Pension reform evidence from Italy", "year": null, "venue": null, "authors": null, "abstract": "In this paper, we exploit pension reform-induced changes in retirement eligibility requirements to assess the role of grandparental child care availability in the labor force participation of women with children under 15. We focus on Italy for two reasons: first, it has low rates of female employment and little formal child care provision, and second, it has undergone several pension reforms in a relatively short time span. Our analysis shows that, among the women studied, those whose own mothers are retirement eligible have a 11 percent higher probability of being in the labor force than those whose mothers are ineligible. The pension eligibility of maternal grandfathers and paternal grandparents, however, has no significant effect on the womenâ€™s labor force participation. We also demonstrate that the eligibility of maternal grandmothers mainly captures the effect of their availability for child care. Hence, pension reforms, by potentially robbing households of an important source of flexible, low-cost child care, could have unintended negative consequences for the employment rates of women with children.", "is_gold": false, "tier": 3, "evidence_type": "quasi-experimental", "cell": "OFF", "outcome": "maternal labor-force participation", "mechanism": "pension-reform-induced grandparental childcare availability", "direction": "forward", "reason": "Uses pension-reform variation but the outcome is maternal employment via grandparental childcare, not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Grandparental%20availability%20for%20child%20care%20and%20maternal%20labor%20force%20participation%3A%20Pension%20reform%20evidence%20from%20Italy"}, {"id": "W2749373474", "group": "uncertain", "title": "How working mothers combine paid work with looking after children and the implications for their pensions", "year": null, "venue": null, "authors": null, "abstract": "This research explores working mothers’ decisions on combining paid work with looking after children and the implications these have for their pensions, and whether they have changed over time. Two cohorts of mothers are interviewed. The first cohort are working mothers aged between 30-40 years with the aim to explore their decisions’ to combine paid work with looking after children and their current situation of financial planning for retirement. The second cohort are mothers who are in receipt of state and/or non-state pensions and are aged between 60-70 years with the aim to explore how they combined paid work with looking after children and how they had planned financially for their retirement. Empirically, this research compares an earlier cohort of mothers who started to receive state and/or non-state pensions with working mothers whose retirement is expected to be around 2050. This research analyses pension provision for women in the United Kingdom through a critical review of Conservative and Labour Governments’ policies between 1979 and 2010 in addressing gender inequalities in pension provision for women. The period 1979 to 2010 covers the beginnings of the gradual and long term shift from state to non-state pension provision by 2050. Welfare state/regimes and sociological theories are used in this research study in order to explore working mothers’ decisions on paid work with looking after children and the implications these have for their pensions, given the policy shift from state to non-state pension provision. Working mothers’ experiences in combining paid work with looking after children show that mothers can hold different gendered moral rationalities and shift between the ideal types of social policy over time. This is shaped by whether they have a cho", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "mothers' pension provision", "mechanism": "childrearing/paid-work tradeoff → women's pension accumulation", "direction": "reverse", "reason": "how combining childcare and work shapes mothers' pensions, reverse direction", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=How%20working%20mothers%20combine%20paid%20work%20with%20looking%20after%20children%20and%20the%20implications%20for%20their%20pensions"}, {"id": "W2579746782", "group": "uncertain", "title": "Intergenerational child care a fertility intentions : The Swedish welfare context", "year": null, "venue": null, "authors": null, "abstract": "Using the Generations and Gender Survey (GGS) and ordered logistic regression, the relation of intergenerational child care and short-term fertility intentions is explored in the gender-egalitarian Swedish family policy context. Overall, receiving child care help from parents or grandparents does not seem to influence whether women or men with one or two children plan to have another child. The results support the Swedish public child care system's effectiveness in facilitating relatively high fertility and work- and family compatibility, while informal child care is at best complementary. Only women and men aged 18-29 years old with two children were found to be significantly more likely in having another child within three years when receiving intergenerational child care support.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "short-term fertility intentions", "mechanism": "grandparental/intergenerational childcare", "direction": "forward", "reason": "Intergenerational childcare -> fertility intentions; adjacent grandparental-childcare channel, not the pension/OAS relationship.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20child%20care%20a%20fertility%20intentions%20%3A%20The%20Swedish%20welfare%20context"}, {"id": "W1560000721", "group": "uncertain", "title": "Intergenerational Child Care Support and the Fluctuating Fertility: A Note", "year": null, "venue": null, "authors": null, "abstract": "This paper describes the relation between fertility and intergenerational child-care support provided by grandparents in a model based on the overlapping generations model with endogenous fertility. Results show that intergenerational child-care support causes fertility to fluctuate. This paper presents an alternative model of fluctuating fertility shown by the `Easterlin Hypothesis &amp;apos; described by Benhabib and Nishimura (1989), and others. Moreover, this paper shows that an increase in rewards for child care supplied by older people does not always increase child care. Consequently, younger people can not depend on sufficient intergenerational child-care support. This paper was presented at the 2006 Autumn Meeting of Japanese Association for Applied Economics held at Hiroshima Shudo University. We are grateful to Mototsugu Fukushige, Takeshi Koba, Tamotsu Nakamura, Takeshi Nakatani, Akira Okamoto and seminar participants for their useful comments. Any remaining errors are the author&amp;apos;s responsibility.", "is_gold": false, "tier": 3, "evidence_type": "theory", "cell": "OFF", "outcome": "fertility (fluctuations)", "mechanism": "intergenerational grandparental childcare support", "direction": "forward", "reason": "OLG model of grandparental childcare support and fertility; off-channel relative to the pension/old-age-security motive.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20Child%20Care%20Support%20and%20the%20Fluctuating%20Fertility%3A%20A%20Note"}, {"id": "W2560411256", "group": "uncertain", "title": "Intergenerational Comparison of Value of Children among Urban Women Population in Mashhad, Iran, 2014", "year": null, "venue": null, "authors": null, "abstract": "Introduction: The theory of value of children refers to the needs which children provide for their parents. Considering the close relationship between the value orientation of people with the decisions in organizing life and forming a family, including having children, and according to decreased fertility rate in Iran, the present study was performed with aim of intergenerational comparison of the value of children and its dimensions among women in Mashhad. Methods: This cross-sectional study was performed as multi-stage sampling on 712 women referred to health centers in Mashhad and using a demographic questionnaire and the questionnaire of value of children, including three emotional, economic and social dimensions, which its validity was determined using content validity and its reliability by internal consistency. Data was analyzed using SPSS software (version 16). P Results: The studied women more perceived emotional value of children with a mean score of 68.89 ± 18.02, and then the economic value of children with a mean score of 46.13 ± 19.36, and the social value of children with a mean score of 43.89 ± 15.15 had the lowest priority among women. Also, the mean score of emotional value of children was higher among younger women and economic and social value was higher among older women. Conclusion: The results of this study demonstrate more importance of emotional value of children among women and changing the value of children from economic and social point of view to emotional one among younger generation that suggests a new vision to design comprehensive and regular training plans in order to promote women's reproductive behavior.", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "perceived value of children (economic/social/emotional)", "mechanism": "economic/old-age-support value of children", "direction": "forward", "reason": "Value-of-children study touches economic/old-age-support value but measures attitudes, not a pension-fertility estimate; keep for RA gate.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20Comparison%20of%20Value%20of%20Children%20among%20Urban%20Women%20Population%20in%20Mashhad%2C%20Iran%2C%202014"}, {"id": "W216871533", "group": "uncertain", "title": "Intergenerational inter vivos transfers: What is the pattern and level of financial support parents provide their adult children?", "year": null, "venue": null, "authors": null, "abstract": "Why do parents give their adult children money? What child and parental characteristics influence monetary transfers? Does the effect of these characteristics differ across low, medium, and high transfer dollar amounts? What is the parent's motive behind providing their adult child with a financial transfer? Is it based on the child's income or a life event experienced by the child (i.e., altruism or contingent exchange)? This research examines the relationship between financial transfers and characteristics of the adult child. The data used are the 1992–1994 Health and Retirement Study (HRS), which contains a nationally representative sample of adults born between 1931 and 1941. At baseline, financial transfers to 18,463 adult children living independently from their parent's household (N = 6,001) are examined. Cross-sectional and longitudinal models are specified to determine the relationship between the financial transfer and characteristics of the adult child, controlling characteristics of the parental household across transfer levels. The motive behind the financial transfer behavior is tested using two competing theories, altruism and contingent exchange. Lastly, the relationship between race and the financial transfer as a percent of total household income is examined. Two variables consistently have the greatest effect on the amount of the financial transfer the adult child receives: whether or not the child is currently in school and the total number of children from the parental household. These variables consistently have the greatest effects across: (1) all adult children and sub-samples based on financial transfer amounts, and (2) cross-sectional models specified by either logistic or tobit regression and the longitudinal change models. The motivation behi", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "parental financial transfers to adult children", "mechanism": "altruism vs contingent-exchange transfer motive", "direction": "n/a", "reason": "transfer-motive study (parents→adult children), thematically adjacent but not OAS→fertility", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20inter%20vivos%20transfers%3A%20What%20is%20the%20pattern%20and%20level%20of%20financial%20support%20parents%20provide%20their%20adult%20children%3F"}, {"id": "W4408074300", "group": "uncertain", "title": "Intergenerational Relationship Types and Attitude Toward Retirement: Do Gender and Number of Children Matter?", "year": null, "venue": null, "authors": null, "abstract": "", "is_gold": false, "tier": 3, "evidence_type": "observational", "cell": "OFF", "outcome": "attitude toward retirement", "mechanism": "number of children and intergenerational relationships", "direction": "reverse", "reason": "Links number of children to retirement attitudes (no abstract); plausibly touches OAS motive but outcome is not fertility.", "snow_reason": null, "scholar": "https://scholar.google.com/scholar?q=Intergenerational%20Relationship%20Types%20and%20Attitude%20Toward%20Retirement%3A%20Do%20Gender%20and%20Number%20of%20Children%20Matter%3F"}, {"id": "W4324363461", "group": "uncertain", "title": "Intergenerational Support and Second-Child Fertility Intention in the Chinese Sandwich Generation: The Parallel Mediation Model of Double Burnout", "year": null, "venue": null, "authors": null, "abstract": "In 2013, the Chinese government implemented a two-child policy to increase the country's fertility rate. However, the persistently low rates necessitated other measures to boost fertility. This study empirically investigated the association between intergenerational support and second-child fertility intention in the Chinese sandwich generation and demonstrated the mediating role of parental burnout and burnout in caring for grandparents. Survey data collected at Time 1, Time 2, and Time 3 included 2939 participants from different regions of China. Before analyzing the data, coarsened exact matching and propensity score matching was conducted to reduce sampling bias. Regression analysis results indicated that intergenerational support has a significant total positive effect on second-child fertility intention. Furthermore, mediation path analysis revealed that parental burnout and burnout in caring for grandparents play significant but opposite directional mediating roles in the association between intergenerational support and second-child fertility intention. Sensitivity analysis using different calipers yielded similar results. These results indicated that second-child fertility intention can be increased among the Chinese sandwich generation with intergenerational support, by mitigating parental burnout. However, intergenerational support did not alleviate burnout in caring for grandparents in the sandwich generation; therefore, formal older adult care policies are required to help the sandwich generation experience lower burnout, while receiving intergenerational support.", "is_gold": f
